<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamFlow Player</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --bg-dark: #0a0a0a;
            --primary: #ffffff;
            --secondary: #a0a0a0;
            --accent: #00d4ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-dark);
            color: var(--primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .liquid-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; overflow: hidden; background: #050505;
        }
        .blob {
            position: absolute; border-radius: 50%;
            filter: blur(100px); opacity: 0.3;
            animation: float 20s infinite ease-in-out;
        }
        .blob-1 {
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(0,212,255,0.2) 0%, transparent 70%);
            top: -200px; right: -200px;
        }
        .blob-2 {
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            bottom: -150px; left: -150px;
            animation-delay: -5s;
        }
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-30px, 30px) scale(0.9); }
        }

        .glass-nav {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            padding: 20px 30px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .logo { 
            display: flex; align-items: center; gap: 12px; 
            font-size: 1.3rem; font-weight: 700; 
            text-decoration: none; color: var(--primary);
        }
        .back-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--primary);
            padding: 10px 20px; border-radius: 12px;
            cursor: pointer; transition: all 0.3s ease;
            text-decoration: none; display: flex; align-items: center; gap: 8px;
        }
        .back-btn:hover { background: var(--glass-border); }

        .main-content {
            flex: 1;
            padding: 30px;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
        }

        .video-header {
            margin-bottom: 24px;
        }
        .category-tag {
            display: inline-flex; align-items: center; gap: 6px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 6px 14px; border-radius: 20px;
            font-size: 0.8rem; text-transform: uppercase;
            color: var(--secondary); margin-bottom: 12px;
        }
        .video-title {
            font-size: 2rem; font-weight: 700;
            line-height: 1.3;
            background: linear-gradient(135deg, #fff 0%, #888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .player-container {
            flex: 1;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            overflow: hidden;
            position: relative;
            min-height: 400px;
        }
        .video-wrapper {
            position: absolute; inset: 0;
        }
        .video-wrapper iframe {
            width: 100%; height: 100%; border: none;
        }
        .loading {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            color: var(--secondary);
        }
        .loading i {
            font-size: 3rem; margin-bottom: 16px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .video-error {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            text-align: center; padding: 40px;
            color: var(--secondary);
        }
        .video-error i { 
            font-size: 4rem; margin-bottom: 20px; 
            color: #ff4444; 
        }
        .video-error h3 {
            color: var(--primary); margin-bottom: 12px;
            font-size: 1.5rem;
        }
        .video-error p { max-width: 400px; line-height: 1.6; }

        .video-meta-bar {
            margin-top: 24px;
            padding: 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            display: flex; align-items: center; gap: 24px;
            color: var(--secondary); font-size: 0.9rem;
        }
        .meta-item { display: flex; align-items: center; gap: 8px; }
        .meta-item i { color: var(--accent); }

        @media (max-width: 768px) {
            .main-content { padding: 20px; }
            .video-title { font-size: 1.5rem; }
            .player-container { min-height: 250px; border-radius: 16px; }
            .glass-nav { padding: 15px 20px; }
        }
    </style>
</head>
<body>
    <div class="liquid-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <nav class="glass-nav">
        <a href="index.html" class="logo">
            <i class="fas fa-play-circle"></i>
            <span>StreamFlow</span>
        </a>
        <a href="index.html" class="back-btn">
            <i class="fas fa-arrow-left"></i> Kembali
        </a>
    </nav>

    <main class="main-content">
        <div class="video-header">
            <div class="category-tag" id="categoryTag">
                <i class="fas fa-folder"></i> <span>Loading...</span>
            </div>
            <h1 class="video-title" id="videoTitle">Loading...</h1>
        </div>

        <div class="player-container" id="playerContainer">
            <div class="loading" id="loading">
                <i class="fas fa-spinner"></i>
                <span>Memuat video...</span>
            </div>
        </div>

        <div class="video-meta-bar">
            <div class="meta-item">
                <i class="fas fa-play-circle"></i>
                <span>Telegram Stream</span>
            </div>
            <div class="meta-item">
                <i class="fas fa-shield-alt"></i>
                <span>Embed Player</span>
            </div>
            <div class="meta-item">
                <i class="fas fa-clock"></i>
                <span id="currentTime">-</span>
            </div>
        </div>
    </main>

    <script>
        // Parse URL parameters
        const params = new URLSearchParams(window.location.search);
        const telegramUrl = params.get('url');
        const title = params.get('title') || 'Untitled Video';
        const category = params.get('cat') || 'uncategorized';

        // Update page
        document.getElementById('videoTitle').textContent = decodeURIComponent(title);
        document.getElementById('categoryTag').innerHTML = 
            `<i class="fas fa-folder"></i> <span>${decodeURIComponent(category)}</span>`;
        document.title = `${decodeURIComponent(title)} - StreamFlow`;

        // Update time
        function updateTime() {
            const now = new Date();
            document.getElementById('currentTime').textContent = 
                now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
        }
        updateTime();
        setInterval(updateTime, 60000);

        // Load video
        if (telegramUrl && telegramUrl.includes('t.me/')) {
            const container = document.getElementById('playerContainer');
            
            // Convert URL to embed format
            // Format: https://t.me/channel_name/123?embed=1
            const embedUrl = telegramUrl.includes('?') 
                ? `${telegramUrl}&embed=1` 
                : `${telegramUrl}?embed=1`;

            // Timeout untuk error handling
            setTimeout(() => {
                const iframe = container.querySelector('iframe');
                if (!iframe) {
                    showError();
                }
            }, 10000);

            container.innerHTML = `
                <div class="video-wrapper">
                    <iframe 
                        src="${embedUrl}" 
                        allowfullscreen 
                        allow="autoplay; encrypted-media"
                        onload="document.getElementById('loading')?.remove()"
                        onerror="showError()">
                    </iframe>
                </div>
            `;
        } else {
            showError();
        }

        function showError() {
            document.getElementById('playerContainer').innerHTML = `
                <div class="video-error">
                    <i class="fas fa-exclamation-triangle"></i>
                    <h3>Video Tidak Dapat Dimuat</h3>
                    <p>
                        Pastikan:<br>
                        1. URL Telegram benar (format: https://t.me/channel/message_id)<br>
                        2. Channel/video bersifat publik<br>
                        3. Video masih tersedia di Telegram<br>
                        4. Coba akses langsung URL di browser
                    </p>
                </div>
            `;
        }
    </script>
</body>
</html>

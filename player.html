<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamFlow Player</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --bg-dark: #0a0a0a;
            --primary: #ffffff;
            --secondary: #a0a0a0;
            --accent: #00d4ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-dark);
            color: var(--primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .liquid-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; overflow: hidden; background: #050505;
        }
        .blob {
            position: absolute; border-radius: 50%;
            filter: blur(100px); opacity: 0.3;
            animation: float 20s infinite ease-in-out;
        }
        .blob-1 {
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(0,212,255,0.2) 0%, transparent 70%);
            top: -200px; right: -200px;
        }
        .blob-2 {
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            bottom: -150px; left: -150px;
            animation-delay: -5s;
        }
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-30px, 30px) scale(0.9); }
        }

        .glass-nav {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            padding: 20px 30px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .logo { 
            display: flex; align-items: center; gap: 12px; 
            font-size: 1.3rem; font-weight: 700; 
            text-decoration: none; color: var(--primary);
        }
        .back-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--primary);
            padding: 10px 20px; border-radius: 12px;
            cursor: pointer; transition: all 0.3s ease;
            text-decoration: none; display: flex; align-items: center; gap: 8px;
        }
        .back-btn:hover { background: var(--glass-border); }

        .main-content {
            flex: 1;
            padding: 30px;
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
        }

        .video-header {
            margin-bottom: 24px;
        }
        .category-tag {
            display: inline-flex; align-items: center; gap: 6px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 6px 14px; border-radius: 20px;
            font-size: 0.8rem; text-transform: uppercase;
            color: var(--secondary); margin-bottom: 12px;
        }
        .video-title {
            font-size: 2rem; font-weight: 700;
            line-height: 1.3;
            background: linear-gradient(135deg, #fff 0%, #888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* PLAYER CONTAINER */
        .player-wrapper {
            flex: 1;
            background: #000;
            border-radius: 24px;
            overflow: hidden;
            position: relative;
            min-height: 400px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.8);
        }

        .player-iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* CUSTOM CONTROLS OVERLAY */
        .player-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }
        .player-wrapper:hover .player-controls {
            opacity: 1;
            pointer-events: all;
        }

        .control-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        .control-btn:hover {
            background: rgba(255,255,255,0.2);
            transform: scale(1.1);
        }

        /* FULLSCREEN MODE */
        .player-wrapper.fullscreen {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            border-radius: 0;
            z-index: 9999;
        }
        .player-wrapper.fullscreen .player-controls {
            opacity: 1;
            pointer-events: all;
            padding: 30px;
        }

        /* Loading */
        .loading {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            color: var(--secondary);
            background: #000;
            z-index: 10;
        }
        .loading i {
            font-size: 3rem; margin-bottom: 16px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .video-meta-bar {
            margin-top: 24px;
            padding: 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            display: flex; align-items: center; gap: 24px;
            color: var(--secondary); font-size: 0.9rem;
        }
        .meta-item { display: flex; align-items: center; gap: 8px; }
        .meta-item i { color: var(--accent); }

        @media (max-width: 768px) {
            .main-content { padding: 20px; }
            .video-title { font-size: 1.3rem; }
            .player-wrapper { min-height: 250px; border-radius: 16px; }
            .glass-nav { padding: 15px 20px; }
        }
    </style>
</head>
<body>
    <div class="liquid-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <nav class="glass-nav">
        <a href="index.html" class="logo">
            <i class="fas fa-play-circle"></i>
            <span>StreamFlow</span>
        </a>
        <a href="index.html" class="back-btn">
            <i class="fas fa-arrow-left"></i> Kembali
        </a>
    </nav>

    <main class="main-content">
        <div class="video-header">
            <div class="category-tag" id="categoryTag">
                <i class="fas fa-folder"></i> <span>Loading...</span>
            </div>
            <h1 class="video-title" id="videoTitle">Loading...</h1>
        </div>

        <div class="player-wrapper" id="playerWrapper">
            <div class="loading" id="loading">
                <i class="fas fa-spinner"></i>
                <span>Memuat video...</span>
            </div>
            <!-- Iframe akan di-insert di sini -->
            
            <div class="player-controls">
                <button class="control-btn" onclick="toggleFullscreen()" title="Fullscreen (F)">
                    <i class="fas fa-expand" id="fullscreenIcon"></i>
                </button>
            </div>
        </div>

        <div class="video-meta-bar">
            <div class="meta-item">
                <i class="fas fa-play-circle"></i>
                <span>Google Drive Stream</span>
            </div>
            <div class="meta-item">
                <i class="fas fa-expand"></i>
                <span>Fullscreen Available</span>
            </div>
            <div class="meta-item">
                <i class="fas fa-keyboard"></i>
                <span>Press F for Fullscreen</span>
            </div>
        </div>
    </main>

    <script>
        // Parse URL parameters
        const params = new URLSearchParams(window.location.search);
        const driveId = params.get('id');
        const title = params.get('title') || 'Untitled Video';
        const category = params.get('cat') || 'uncategorized';

        // Update page info
        document.getElementById('videoTitle').textContent = decodeURIComponent(title);
        document.getElementById('categoryTag').innerHTML = 
            `<i class="fas fa-folder"></i> <span>${decodeURIComponent(category)}</span>`;
        document.title = `${decodeURIComponent(title)} - StreamFlow`;

        if (driveId && driveId.length >= 25) {
            const wrapper = document.getElementById('playerWrapper');
            const loading = document.getElementById('loading');
            
            // Buat iframe dengan Google Drive preview
            const iframe = document.createElement('iframe');
            iframe.className = 'player-iframe';
            iframe.src = `https://drive.google.com/file/d/${driveId}/preview?usp=sharing`;
            iframe.allowFullscreen = true;
            iframe.allow = "autoplay; encrypted-media; fullscreen";
            
            // Sembunyikan loading saat iframe load
            iframe.onload = () => {
                loading.style.display = 'none';
            };
            
            // Insert sebelum loading
            wrapper.insertBefore(iframe, loading);
            
        } else {
            document.getElementById('playerWrapper').innerHTML = `
                <div style="position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; color:var(--secondary); text-align:center; padding:40px;">
                    <i class="fas fa-exclamation-triangle" style="font-size:4rem; margin-bottom:20px; color:#ff4444;"></i>
                    <h3 style="color:var(--primary); margin-bottom:12px;">ID Video Tidak Valid</h3>
                    <p>ID Google Drive tidak ditemukan atau format salah.</p>
                </div>
            `;
        }

        // Fullscreen function
        function toggleFullscreen() {
            const wrapper = document.getElementById('playerWrapper');
            const icon = document.getElementById('fullscreenIcon');
            
            if (!document.fullscreenElement) {
                // Masuk fullscreen
                if (wrapper.requestFullscreen) {
                    wrapper.requestFullscreen();
                } else if (wrapper.webkitRequestFullscreen) {
                    wrapper.webkitRequestFullscreen();
                } else if (wrapper.msRequestFullscreen) {
                    wrapper.msRequestFullscreen();
                }
                wrapper.classList.add('fullscreen');
                icon.className = 'fas fa-compress';
            } else {
                // Keluar fullscreen
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                } else if (document.msExitFullscreen) {
                    document.msExitFullscreen();
                }
                wrapper.classList.remove('fullscreen');
                icon.className = 'fas fa-expand';
            }
        }

        // Listen fullscreen change
        document.addEventListener('fullscreenchange', () => {
            const wrapper = document.getElementById('playerWrapper');
            const icon = document.getElementById('fullscreenIcon');
            
            if (!document.fullscreenElement) {
                wrapper.classList.remove('fullscreen');
                icon.className = 'fas fa-expand';
            }
        });

        // Keyboard shortcut
        document.addEventListener('keydown', (e) => {
            if (e.code === 'KeyF') {
                e.preventDefault();
                toggleFullscreen();
            } else if (e.code === 'Escape' && document.fullscreenElement) {
                document.exitFullscreen();
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONO | Minimalist Music Player</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <script src="https://sdk.scdn.co/spotify-player.js"></script>
    <style>
        /* CSS TIDAK ADA YANG DIRUBAH, SAMA PERSIS SEPERTI SEBELUMNYA */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --black: #0a0a0a; --dark-gray: #141414; --medium-gray: #1f1f1f;
            --light-gray: #2a2a2a; --border-gray: #333333; --text-primary: #ffffff;
            --text-secondary: #a0a0a0; --text-muted: #666666; --accent: #ffffff;
        }
        @font-face {
            font-family: 'Inter';
            src: url('https://fonts.gstatic.com/s/inter/v13/UcCO3FwrK3iLTeHuS_fvQtMwCp50KnMw2boKoduKmMEVuLyfAZ9hiJ-Ek-_EeA.woff2') format('woff2');
            font-weight: 400; font-style: normal;
        }
        @font-face {
            font-family: 'Inter';
            src: url('https://fonts.gstatic.com/s/inter/v13/UcCO3FwrK3iLTeHuS_fvQtMwCp50KnMw2boKoduKmMEVuGKYAZ9hiJ-Ek-_EeA.woff2') format('woff2');
            font-weight: 500; font-style: normal;
        }
        @font-face {
            font-family: 'Inter';
            src: url('https://fonts.gstatic.com/s/inter/v13/UcCO3FwrK3iLTeHuS_fvQtMwCp50KnMw2boKoduKmMEVuBWYAZ9hiJ-Ek-_EeA.woff2') format('woff2');
            font-weight: 600; font-style: normal;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
            background-color: var(--black); color: var(--text-primary);
            min-height: 100vh; display: flex; justify-content: center;
            align-items: center; overflow-x: hidden;
        }
        .app-container {
            width: 100%; max-width: 480px; height: 100vh; max-height: 900px;
            background-color: var(--black); display: flex; flex-direction: column;
            position: relative; overflow: hidden;
        }
        .header {
            padding: 24px 24px 16px; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 1px solid var(--border-gray);
        }
        .logo { font-size: 20px; font-weight: 600; letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px; }
        .logo-icon { width: 24px; height: 24px; background: var(--text-primary); border-radius: 4px; display: flex; align-items: center; justify-content: center; }
        .header-actions { display: flex; gap: 12px; }
        .icon-btn { background: transparent; border: none; color: var(--text-secondary); cursor: pointer; padding: 8px; border-radius: 8px; transition: all 0.2s ease; display: flex; align-items: center; justify-content: center; }
        .icon-btn:hover { background-color: var(--medium-gray); color: var(--text-primary); }
        .icon-btn.active { color: var(--text-primary); background-color: var(--medium-gray); }
        .main-content { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 32px; }
        .main-content::-webkit-scrollbar { width: 0px; }
        .player-section { display: flex; flex-direction: column; align-items: center; gap: 24px; }
        .album-art-container { position: relative; width: 100%; max-width: 320px; aspect-ratio: 1; border-radius: 12px; overflow: hidden; background-color: var(--medium-gray); box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5); }
        .album-art { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s ease; }
        .album-art-container:hover .album-art { transform: scale(1.02); }
        .album-art-placeholder { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-muted); gap: 12px; }
        .album-art-placeholder i { width: 64px; height: 64px; opacity: 0.3; }
        .track-info { text-align: center; width: 100%; }
        .track-title { font-size: 24px; font-weight: 600; margin-bottom: 8px; letter-spacing: -0.3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 0 16px; }
        .track-artist { font-size: 16px; color: var(--text-secondary); font-weight: 400; }
        .progress-container { width: 100%; display: flex; flex-direction: column; gap: 8px; }
        .progress-bar-wrapper { width: 100%; height: 4px; background-color: var(--light-gray); border-radius: 2px; cursor: pointer; position: relative; overflow: hidden; }
        .progress-bar { height: 100%; background-color: var(--text-primary); border-radius: 2px; width: 0%; transition: width 0.1s linear; position: relative; }
        .progress-bar::after { content: ''; position: absolute; right: -6px; top: 50%; transform: translateY(-50%); width: 12px; height: 12px; background-color: var(--text-primary); border-radius: 50%; opacity: 0; transition: opacity 0.2s; }
        .progress-bar-wrapper:hover .progress-bar::after { opacity: 1; }
        .time-display { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-muted); font-variant-numeric: tabular-nums; letter-spacing: 0.5px; }
        .controls { display: flex; align-items: center; justify-content: center; gap: 24px; width: 100%; }
        .control-btn { background: transparent; border: none; color: var(--text-secondary); cursor: pointer; padding: 12px; border-radius: 50%; transition: all 0.2s ease; display: flex; align-items: center; justify-content: center; }
        .control-btn:hover { color: var(--text-primary); transform: scale(1.1); }
        .control-btn.play-pause { background-color: var(--text-primary); color: var(--black); padding: 20px; box-shadow: 0 4px 20px rgba(255, 255, 255, 0.2); }
        .control-btn.play-pause:hover { transform: scale(1.05); box-shadow: 0 6px 30px rgba(255, 255, 255, 0.3); }
        .control-btn.secondary { color: var(--text-muted); }
        .control-btn.secondary:hover { color: var(--text-secondary); }
        .control-btn.active { color: var(--text-primary); }
        .playlist-section { display: flex; flex-direction: column; gap: 16px; }
        .section-header { display: flex; justify-content: space-between; align-items: center; padding: 0 4px; }
        .section-title { font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--text-secondary); }
        .playlist-count { font-size: 12px; color: var(--text-muted); }
        .playlist { display: flex; flex-direction: column; gap: 4px; }
        .playlist-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 8px; cursor: pointer; transition: all 0.2s ease; position: relative; overflow: hidden; }
        .playlist-item:hover { background-color: var(--medium-gray); }
        .playlist-item.active { background-color: var(--light-gray); }
        .playlist-item.active::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background-color: var(--text-primary); }
        .playlist-item-art { width: 48px; height: 48px; border-radius: 6px; background-color: var(--light-gray); flex-shrink: 0; overflow: hidden; position: relative; }
        .playlist-item-art img { width: 100%; height: 100%; object-fit: cover; }
        .playlist-item-art .placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: var(--text-muted); }
        .playlist-item-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; }
        .playlist-item-title { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-primary); }
        .playlist-item-artist { font-size: 12px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .playlist-item-duration { font-size: 12px; color: var(--text-muted); font-variant-numeric: tabular-nums; }
        .playlist-item-actions { opacity: 0; transition: opacity 0.2s; }
        .playlist-item:hover .playlist-item-actions { opacity: 1; }
        .delete-btn { background: transparent; border: none; color: var(--text-muted); cursor: pointer; padding: 4px; display: flex; align-items: center; justify-content: center; border-radius: 4px; transition: all 0.2s; }
        .delete-btn:hover { color: #ff4444; background-color: rgba(255, 68, 68, 0.1); }
        .empty-state { text-align: center; padding: 48px 24px; color: var(--text-muted); }
        .empty-state i { width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.5; }
        .empty-state p { font-size: 14px; margin-bottom: 24px; }
        .action-buttons { display: flex; gap: 12px; margin-bottom: 8px; }
        .btn { flex: 1; padding: 12px 16px; border-radius: 8px; border: 1px solid var(--border-gray); background-color: var(--medium-gray); color: var(--text-primary); font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; justify-content: center; gap: 8px; font-family: inherit; }
        .btn:hover { background-color: var(--light-gray); border-color: var(--text-secondary); }
        .btn-primary { background-color: var(--text-primary); color: var(--black); border: none; }
        .btn-primary:hover { background-color: #e0e0e0; transform: translateY(-1px); }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(0, 0, 0, 0.8); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 24px; opacity: 0; transition: opacity 0.3s ease; }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal { background-color: var(--dark-gray); border-radius: 16px; width: 100%; max-width: 400px; padding: 24px; border: 1px solid var(--border-gray); transform: scale(0.95); transition: transform 0.3s ease; }
        .modal-overlay.active .modal { transform: scale(1); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-title { font-size: 18px; font-weight: 600; }
        .modal-close { background: transparent; border: none; color: var(--text-secondary); cursor: pointer; padding: 4px; border-radius: 4px; display: flex; align-items: center; justify-content: center; }
        .modal-close:hover { color: var(--text-primary); background-color: var(--medium-gray); }
        .file-input-wrapper { position: relative; overflow: hidden; display: inline-block; width: 100%; }
        .file-input { position: absolute; left: -9999px; }
        .file-input-label { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 32px; border: 2px dashed var(--border-gray); border-radius: 12px; cursor: pointer; transition: all 0.2s; color: var(--text-secondary); }
        .file-input-label:hover { border-color: var(--text-secondary); color: var(--text-primary); background-color: var(--medium-gray); }
        #audio-player { display: none; }
        .visualizer { position: absolute; bottom: 0; left: 0; right: 0; height: 60px; display: flex; align-items: flex-end; justify-content: center; gap: 3px; padding: 0 20px; opacity: 0; transition: opacity 0.3s; pointer-events: none; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); }
        .visualizer.active { opacity: 1; }
        .bar { width: 4px; background-color: rgba(255, 255, 255, 0.6); border-radius: 2px; animation: bounce 0s ease-in-out infinite; }
        @keyframes bounce { 0%, 100% { height: 4px; } 50% { height: 40px; } }
        .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px); background-color: var(--medium-gray); color: var(--text-primary); padding: 12px 24px; border-radius: 8px; font-size: 14px; font-weight: 500; border: 1px solid var(--border-gray); opacity: 0; transition: all 0.3s ease; z-index: 2000; display: flex; align-items: center; gap: 8px; }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast.error { border-color: #ff4444; color: #ff4444; }
        .toast.success { border-color: #1db954; color: #1db954; }
        .toast.info { border-color: var(--text-secondary); color: var(--text-secondary); }
        .spinner { width: 20px; height: 20px; border: 2px solid var(--border-gray); border-top-color: var(--text-primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (min-width: 481px) { .app-container { height: 90vh; border-radius: 24px; border: 1px solid var(--border-gray); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); } body { background-color: #050505; } }
        .playing-indicator { display: flex; gap: 2px; align-items: flex-end; height: 12px; }
        .playing-indicator span { width: 3px; background-color: var(--text-primary); border-radius: 1px; animation: sound 0.8s ease-in-out infinite; }
        .playing-indicator span:nth-child(1) { animation-delay: 0s; height: 6px; }
        .playing-indicator span:nth-child(2) { animation-delay: 0.2s; height: 10px; }
        .playing-indicator span:nth-child(3) { animation-delay: 0.4s; height: 8px; }
        @keyframes sound { 0%, 100% { transform: scaleY(1); } 50% { transform: scaleY(1.5); } }
        .playlist-item.active .playing-indicator span { background-color: var(--text-primary); }
        .playlist-item .playing-indicator { display: none; }
        .playlist-item.active .playing-indicator { display: flex; }
        .playlist-item.active .playlist-item-duration { display: none; }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="logo">
                <div class="logo-icon"><i data-lucide="disc-3" style="width: 16px; height: 16px; color: var(--black);"></i></div>
                MONO
            </div>
            <div class="header-actions">
                <button class="icon-btn" id="btn-clear" title="Hapus Semua">
                    <i data-lucide="trash-2" style="width: 20px; height: 20px;"></i>
                </button>
            </div>
        </header>

        <main class="main-content">
            <section class="player-section">
                <div class="album-art-container">
                    <div class="album-art-placeholder" id="album-art">
                        <i data-lucide="music" style="width: 64px; height: 64px;"></i>
                    </div>
                    <div class="visualizer" id="visualizer"></div>
                </div>

                <div class="track-info">
                    <h1 class="track-title" id="track-title">Pilih Lagu</h1>
                    <p class="track-artist" id="track-artist">Daftar putar kosong</p>
                </div>

                <div class="progress-container">
                    <div class="progress-bar-wrapper" id="progress-wrapper">
                        <div class="progress-bar" id="progress-bar"></div>
                    </div>
                    <div class="time-display">
                        <span id="current-time">0:00</span>
                        <span id="duration">0:00</span>
                    </div>
                </div>

                <div class="controls">
                    <button class="control-btn secondary" id="btn-shuffle" title="Acak">
                        <i data-lucide="shuffle" style="width: 20px; height: 20px;"></i>
                    </button>
                    <button class="control-btn" id="btn-prev" title="Sebelumnya">
                        <i data-lucide="skip-back" style="width: 24px; height: 24px; fill: currentColor;"></i>
                    </button>
                    <button class="control-btn play-pause" id="btn-play" title="Putar/Jeda">
                        <i data-lucide="play" style="width: 28px; height: 28px; fill: currentColor; margin-left: 2px;" id="icon-play"></i>
                    </button>
                    <button class="control-btn" id="btn-next" title="Selanjutnya">
                        <i data-lucide="skip-forward" style="width: 24px; height: 24px; fill: currentColor;"></i>
                    </button>
                    <button class="control-btn secondary" id="btn-repeat" title="Ulangi">
                        <i data-lucide="repeat" style="width: 20px; height: 20px;"></i>
                    </button>
                </div>
            </section>

            <section class="playlist-section">
                <div class="section-header">
                    <h2 class="section-title">Daftar Putar</h2>
                    <span class="playlist-count" id="playlist-count">0 lagu</span>
                </div>
                
                <div class="action-buttons">
                    <button class="btn" id="btn-upload">
                        <i data-lucide="upload" style="width: 16px; height: 16px;"></i> Upload File
                    </button>
                    <button class="btn" id="btn-spotify">
                        <i data-lucide="radio" style="width: 16px; height: 16px;"></i> Akun Spotify
                    </button>
                </div>

                <div class="playlist" id="playlist">
                    <div class="empty-state">
                        <i data-lucide="headphones" style="width: 48px; height: 48px;"></i>
                        <p>Belum ada lagu. Tambahkan dari perangkat atau Spotify.</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <audio id="audio-player"></audio>

    <div class="modal-overlay" id="upload-modal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">Tambah Lagu Lokal</h3>
                <button class="modal-close" id="close-upload"><i data-lucide="x" style="width: 20px; height: 20px;"></i></button>
            </div>
            <div class="file-input-wrapper">
                <input type="file" id="file-input" class="file-input" accept="audio/mp3,audio/wav,audio/mpeg,audio/*" multiple>
                <label for="file-input" class="file-input-label">
                    <i data-lucide="upload-cloud" style="width: 32px; height: 32px;"></i>
                    <span>Klik atau seret file audio (.mp3, .wav)</span>
                    <span style="font-size: 12px; color: var(--text-muted);">Maksimal 50MB per file</span>
                </label>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="spotify-modal">
        <div class="modal" id="spotify-modal-content">
            <div class="modal-header">
                <h3 class="modal-title">Hubungkan Spotify</h3>
                <button class="modal-close" id="close-spotify"><i data-lucide="x" style="width: 20px; height: 20px;"></i></button>
            </div>
            
            <div id="spotify-login-section">
                <p style="font-size: 14px; color: var(--text-secondary); margin-bottom: 16px; text-align: center;">
                    Login untuk melihat playlist Anda. Wajib <strong>Spotify Premium</strong> agar bisa memutar lagu penuh.
                </p>
                <button class="btn btn-primary" id="btn-login-spotify" style="width: 100%; background-color: #1db954; color: #fff; border:none;">
                    <i data-lucide="log-in" style="width: 16px; height: 16px;"></i> Login via Spotify
                </button>
            </div>

            <div id="spotify-playlist-section" style="display: none;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                    <h4 style="font-size: 14px;">Playlist Anda</h4>
                    <button id="btn-logout-spotify" style="background:none; border:none; color:#ff4444; font-size:12px; cursor:pointer;">Logout</button>
                </div>
                <div id="user-playlists" style="max-height: 250px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px;">
                    </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // === INISIALISASI DASAR ===
        lucide.createIcons();

        const state = {
            playlist: [],
            currentIndex: -1,
            isPlaying: false,
            isShuffled: false,
            isRepeating: false,
            currentTime: 0,
            duration: 0,
            
            // Konfigurasi Spotify Baru
            spotifyPlayer: null,
            spotifyDeviceId: null,
            spotifyTrackDuration: 0,
            spotifyTrackPosition: 0,
            progressInterval: null // Untuk update progress bar spotify
        };

        // DOM Elements
        const audio = document.getElementById('audio-player');
        const playlistEl = document.getElementById('playlist');
        const trackTitle = document.getElementById('track-title');
        const trackArtist = document.getElementById('track-artist');
        const albumArt = document.getElementById('album-art');
        const progressBar = document.getElementById('progress-bar');
        const progressWrapper = document.getElementById('progress-wrapper');
        const currentTimeEl = document.getElementById('current-time');
        const durationEl = document.getElementById('duration');
        const btnPlay = document.getElementById('btn-play');
        const visualizer = document.getElementById('visualizer');

        // Modal Elements
        const uploadModal = document.getElementById('upload-modal');
        const spotifyModal = document.getElementById('spotify-modal');

        // === KONFIGURASI SPOTIFY OAUTH (WAJIB DISESUAIKAN JIKA HOSTING BERUBAH) ===
        const SPOTIFY_CLIENT_ID = 'cdce57759f7145878363947955afa2b6'; 
        const REDIRECT_URI = window.location.origin + window.location.pathname; 
        const SCOPES = 'user-read-private playlist-read-private streaming user-read-email user-modify-playback-state user-read-playback-state';

        function getSpotifyTokenFromUrl() {
            const hash = window.location.hash.substring(1);
            const params = new URLSearchParams(hash);
            const token = params.get('access_token');
            if (token) {
                localStorage.setItem('spotify_access_token', token);
                window.history.pushState("", document.title, window.location.pathname);
                return token;
            }
            return localStorage.getItem('spotify_access_token');
        }

        const SpotifyAuth = {
            token: getSpotifyTokenFromUrl(),
            
            login() {
                const authUrl = `https://accounts.spotify.com/authorize?client_id=${SPOTIFY_CLIENT_ID}&response_type=token&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&scope=${encodeURIComponent(SCOPES)}`;
                window.location.href = authUrl; 
            },

            logout() {
                this.token = null;
                localStorage.removeItem('spotify_access_token');
                if (state.spotifyPlayer) state.spotifyPlayer.disconnect();
                checkSpotifyAuthState();
                showToast('Logout dari Spotify berhasil', 'info');
            },

            async fetchWebApi(endpoint, method = 'GET', body = null) {
                if (!this.token) throw new Error("Not logged in");
                const options = { headers: { 'Authorization': `Bearer ${this.token}` }, method };
                if (body) options.body = JSON.stringify(body);
                
                const res = await fetch(`https://api.spotify.com/v1${endpoint}`, options);
                
                if (res.status === 401) {
                    this.logout();
                    throw new Error("Token expired");
                }
                
                // Spotify API sometimes returns 204 No Content for Play/Pause commands
                if (res.status === 204) return true;
                return await res.json();
            }
        };

        // === SPOTIFY WEB PLAYBACK SDK INIT ===
        window.onSpotifyWebPlaybackSDKReady = () => {
            if (!SpotifyAuth.token) return; // Jangan init jika belum login

            const player = new Spotify.Player({
                name: 'MONO Minimalist Player',
                getOAuthToken: cb => { cb(SpotifyAuth.token); },
                volume: 0.8
            });

            player.addListener('ready', ({ device_id }) => {
                console.log('Spotify Player Ready with Device ID', device_id);
                state.spotifyDeviceId = device_id;
            });

            player.addListener('not_ready', ({ device_id }) => {
                console.log('Device ID has gone offline', device_id);
            });

            player.addListener('player_state_changed', (playerState) => {
                if (!playerState) return;
                
                // Sinkronisasi status play/pause dari SDK ke UI Web
                state.isPlaying = !playerState.paused;
                state.spotifyTrackDuration = playerState.duration;
                state.spotifyTrackPosition = playerState.position;
                
                updatePlayButton();
                toggleVisualizer(state.isPlaying);
            });

            player.connect();
            state.spotifyPlayer = player;
        };


        // === UI & UTILITY FUNCTIONS ===
        function initVisualizer() {
            visualizer.innerHTML = '';
            for (let i = 0; i < 20; i++) {
                const bar = document.createElement('div');
                bar.className = 'bar';
                bar.style.animationDuration = `${0.4 + Math.random() * 0.6}s`;
                bar.style.animationPlayState = 'paused';
                visualizer.appendChild(bar);
            }
        }
        initVisualizer();

        function generateId() { return Date.now().toString(36) + Math.random().toString(36).substr(2); }
        function formatTime(seconds) {
            if (isNaN(seconds) || seconds < 0) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }
        function showToast(message, type = 'default') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type}`;
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        const Storage = {
            save() {
                const playlistData = state.playlist.map(track => ({
                    id: track.id, title: track.title, artist: track.artist,
                    durationFormatted: track.durationFormatted, cover: track.cover,
                    source: track.source, spotifyUri: track.spotifyUri
                }));
                localStorage.setItem('mono_playlist', JSON.stringify(playlistData));
            },
            load() {
                const saved = localStorage.getItem('mono_playlist');
                if (saved) {
                    try {
                        const parsed = JSON.parse(saved);
                        state.playlist = parsed;
                        renderPlaylist();
                    } catch (e) { console.error('Error loading playlist', e); }
                }
            },
            clear() {
                localStorage.removeItem('mono_playlist');
                state.playlist.forEach(t => { if (t.url && t.source === 'local') URL.revokeObjectURL(t.url); });
                state.playlist = []; state.currentIndex = -1;
                resetPlayer(); renderPlaylist();
                showToast('Daftar putar dihapus', 'success');
            }
        };

        // === LOCAL FILE HANDLING ===
        function extractMetadata(file) {
            return new Promise((resolve) => {
                const track = { title: file.name.replace(/\.[^/.]+$/, ''), artist: 'Unknown', cover: null };
                if (window.jsmediatags) {
                    jsmediatags.read(file, {
                        onSuccess: (tag) => {
                            if (tag.tags.title) track.title = tag.tags.title;
                            if (tag.tags.artist) track.artist = tag.tags.artist;
                            if (tag.tags.picture) {
                                let base64String = '';
                                for (let i = 0; i < tag.tags.picture.data.length; i++) {
                                    base64String += String.fromCharCode(tag.tags.picture.data[i]);
                                }
                                track.cover = `data:${tag.tags.picture.format};base64,${window.btoa(base64String)}`;
                            }
                            resolve(track);
                        },
                        onError: () => resolve(track)
                    });
                } else resolve(track);
            });
        }

        async function handleFileUpload(files) {
            const validFiles = Array.from(files).filter(f => f.type.startsWith('audio/') || f.name.match(/\.(mp3|wav)$/i));
            if (!validFiles.length) { showToast('Pilih file audio (mp3/wav)', 'error'); return; }

            for (const file of validFiles) {
                const url = URL.createObjectURL(file);
                const audioTemp = new Audio(url);
                await new Promise((res) => audioTemp.addEventListener('loadedmetadata', res));
                const metadata = await extractMetadata(file);

                state.playlist.push({
                    id: generateId(), title: metadata.title, artist: metadata.artist,
                    duration: audioTemp.duration, durationFormatted: formatTime(audioTemp.duration),
                    url: url, cover: metadata.cover, source: 'local'
                });
            }
            Storage.save(); renderPlaylist(); uploadModal.classList.remove('active');
            showToast(`${validFiles.length} file ditambahkan`, 'success');
        }

        // === HYBRID PLAYER LOGIC (LOCAL + SPOTIFY) ===
        function loadTrack(index, autoPlay = true) {
            if (index < 0 || index >= state.playlist.length) return;
            
            const track = state.playlist[index];
            state.currentIndex = index;
            
            // Update UI
            trackTitle.textContent = track.title;
            trackArtist.textContent = track.artist;
            if (track.cover) albumArt.innerHTML = `<img src="${track.cover}" class="album-art">`;
            else albumArt.innerHTML = `<div class="album-art-placeholder"><i data-lucide="music" style="width: 64px; height: 64px;"></i></div>`;
            lucide.createIcons();
            
            updateActivePlaylistItem();
            
            // Stop Local Audio
            audio.pause();
            
            // Stop Spotify Timer
            if (state.progressInterval) clearInterval(state.progressInterval);

            if (track.source === 'spotify') {
                if (!state.spotifyDeviceId) {
                    showToast('Spotify Player belum siap. Perlu Premium!', 'error');
                    resetPlayerVisuals();
                    return;
                }
                if (autoPlay) playSpotifyTrack(track.spotifyUri);
            } else {
                // Track Lokal
                if (state.spotifyPlayer) state.spotifyPlayer.pause(); // Pause spotify jika ada
                audio.src = track.url;
                if (autoPlay) playAudioLocal();
            }
        }

        // Play Local Audio
        function playAudioLocal() {
            audio.play().then(() => {
                state.isPlaying = true;
                updatePlayButton();
                visualizer.classList.add('active');
                toggleVisualizer(true);
            }).catch(e => showToast('Gagal play file lokal', 'error'));
        }

        // Play Spotify via API ke Device SDK
        async function playSpotifyTrack(uri) {
            try {
                await SpotifyAuth.fetchWebApi(`/me/player/play?device_id=${state.spotifyDeviceId}`, 'PUT', { uris: [uri] });
                state.isPlaying = true;
                updatePlayButton();
                visualizer.classList.add('active');
                toggleVisualizer(true);
                startSpotifyProgressTimer();
            } catch (e) {
                console.error(e);
                showToast('Gagal memutar Spotify (Pastikan Premium)', 'error');
                state.isPlaying = false;
                updatePlayButton();
            }
        }

        // Tombol Play Utama (Hybrid)
        btnPlay.addEventListener('click', async () => {
            if (state.playlist.length === 0) return showToast('Tambahkan lagu dulu', 'error');
            if (state.currentIndex === -1) { loadTrack(0, true); return; }

            const track = state.playlist[state.currentIndex];

            if (track.source === 'spotify') {
                if (!state.spotifyPlayer) return showToast('Spotify tidak terhubung', 'error');
                if (state.isPlaying) {
                    await state.spotifyPlayer.pause();
                    clearInterval(state.progressInterval);
                } else {
                    await state.spotifyPlayer.resume();
                    startSpotifyProgressTimer();
                }
                // Toggle isPlaying dihandle event listener SDK 'player_state_changed'
            } else {
                if (state.isPlaying) {
                    audio.pause();
                    state.isPlaying = false;
                    updatePlayButton();
                    toggleVisualizer(false);
                } else {
                    playAudioLocal();
                }
            }
        });

        // Progress Timer buatan untuk Spotify (karena SDK tidak event per detik)
        function startSpotifyProgressTimer() {
            if (state.progressInterval) clearInterval(state.progressInterval);
            state.progressInterval = setInterval(() => {
                if (state.isPlaying && state.spotifyTrackDuration > 0) {
                    state.spotifyTrackPosition += 1000; // tambah 1 detik
                    updateProgressBar(state.spotifyTrackPosition / 1000, state.spotifyTrackDuration / 1000);
                    
                    // Auto Next jika habis
                    if (state.spotifyTrackPosition >= state.spotifyTrackDuration) {
                        playNext();
                    }
                }
            }, 1000);
        }

        function updateProgressBar(currentSec, totalSec) {
            const percent = (currentSec / totalSec) * 100;
            progressBar.style.width = `${percent}%`;
            currentTimeEl.textContent = formatTime(currentSec);
            durationEl.textContent = formatTime(totalSec);
        }

        // Event listener bawaan audio tag (Lokal)
        audio.addEventListener('timeupdate', () => {
            if (state.playlist[state.currentIndex]?.source === 'local') {
                updateProgressBar(audio.currentTime, audio.duration);
            }
        });
        audio.addEventListener('ended', () => { if (!state.isRepeating) playNext(); else loadTrack(state.currentIndex, true); });

        function playNext() {
            if (!state.playlist.length) return;
            let nextIndex = state.isShuffled ? Math.floor(Math.random() * state.playlist.length) : (state.currentIndex + 1) % state.playlist.length;
            loadTrack(nextIndex, true);
        }

        function playPrev() {
            if (!state.playlist.length) return;
            let prevIndex = state.isShuffled ? Math.floor(Math.random() * state.playlist.length) : (state.currentIndex <= 0 ? state.playlist.length - 1 : state.currentIndex - 1);
            loadTrack(prevIndex, true);
        }

        document.getElementById('btn-next').addEventListener('click', playNext);
        document.getElementById('btn-prev').addEventListener('click', playPrev);

        function updatePlayButton() {
            btnPlay.innerHTML = state.isPlaying 
                ? `<i data-lucide="pause" style="width: 28px; height: 28px; fill: currentColor;"></i>`
                : `<i data-lucide="play" style="width: 28px; height: 28px; fill: currentColor; margin-left: 2px;"></i>`;
            lucide.createIcons();
        }

        function toggleVisualizer(playing) {
            const bars = visualizer.querySelectorAll('.bar');
            bars.forEach(b => b.style.animationPlayState = playing ? 'running' : 'paused');
            if(!playing) visualizer.classList.remove('active');
            else visualizer.classList.add('active');
        }

        function resetPlayerVisuals() {
            trackTitle.textContent = 'Pilih Lagu'; trackArtist.textContent = '-';
            progressBar.style.width = '0%'; currentTimeEl.textContent = '0:00'; durationEl.textContent = '0:00';
            state.isPlaying = false; updatePlayButton(); toggleVisualizer(false);
        }

        function resetPlayer() {
            resetPlayerVisuals();
            if(state.progressInterval) clearInterval(state.progressInterval);
            audio.pause(); audio.src = '';
        }

        // === RENDER PLAYLIST ===
        function renderPlaylist() {
            if (!state.playlist.length) {
                playlistEl.innerHTML = `<div class="empty-state"><i data-lucide="headphones" style="width: 48px; height: 48px;"></i><p>Belum ada lagu.</p></div>`;
                document.getElementById('playlist-count').textContent = '0 lagu';
                lucide.createIcons(); return;
            }

            playlistEl.innerHTML = state.playlist.map((track, i) => `
                <div class="playlist-item ${i === state.currentIndex ? 'active' : ''}" data-index="${i}">
                    <div class="playlist-item-art">
                        ${track.cover ? `<img src="${track.cover}">` : `<div class="placeholder"><i data-lucide="music" style="width: 20px; height: 20px;"></i></div>`}
                    </div>
                    <div class="playlist-item-info">
                        <div class="playlist-item-title">
                            ${track.title} 
                            <span style="font-size: 10px; color: ${track.source === 'spotify' ? '#1db954' : '#a0a0a0'}; ml-2">
                                [${track.source === 'spotify' ? 'Spotify' : 'Local'}]
                            </span>
                        </div>
                        <div class="playlist-item-artist">${track.artist}</div>
                    </div>
                    <div class="playing-indicator"><span></span><span></span><span></span></div>
                    <div class="playlist-item-duration">${track.durationFormatted || '--:--'}</div>
                    <div class="playlist-item-actions"><button class="delete-btn" onclick="deleteTrack(${i}, event)"><i data-lucide="x" style="width: 16px; height: 16px;"></i></button></div>
                </div>
            `).join('');
            
            document.getElementById('playlist-count').textContent = `${state.playlist.length} lagu`;
            lucide.createIcons();

            document.querySelectorAll('.playlist-item').forEach(el => {
                el.addEventListener('click', (e) => {
                    if(!e.target.closest('.delete-btn')) loadTrack(parseInt(el.dataset.index), true);
                });
            });
        }

        function updateActivePlaylistItem() {
            document.querySelectorAll('.playlist-item').forEach((el, i) => {
                el.classList.toggle('active', i === state.currentIndex);
            });
        }

        window.deleteTrack = function(index, e) {
            e.stopPropagation();
            if (state.playlist[index].url && state.playlist[index].source === 'local') URL.revokeObjectURL(state.playlist[index].url);
            state.playlist.splice(index, 1);
            if (state.currentIndex === index) { resetPlayer(); state.currentIndex = -1; } 
            else if (state.currentIndex > index) state.currentIndex--;
            Storage.save(); renderPlaylist();
        }

        // === SPOTIFY UI & FETCH PLAYLISTS ===
        function checkSpotifyAuthState() {
            const ls = document.getElementById('spotify-login-section');
            const ps = document.getElementById('spotify-playlist-section');
            if (SpotifyAuth.token) { ls.style.display = 'none'; ps.style.display = 'block'; renderSpotifyPlaylists(); } 
            else { ls.style.display = 'block'; ps.style.display = 'none'; }
        }

        async function renderSpotifyPlaylists() {
            const container = document.getElementById('user-playlists');
            container.innerHTML = '<div class="spinner" style="margin: 0 auto;"></div>';
            try {
                const data = await SpotifyAuth.fetchWebApi('/me/playlists');
                if(!data.items || data.items.length === 0) {
                    container.innerHTML = '<p style="font-size:12px; color:var(--text-muted);">Tidak ada playlist.</p>'; return;
                }
                container.innerHTML = data.items.map(p => `
                    <div class="btn" style="justify-content: flex-start;" onclick="importSpotifyPlaylist('${p.id}', '${p.name}')">
                        <i data-lucide="list-music" style="width: 16px; height: 16px;"></i> <span style="overflow:hidden; white-space:nowrap; text-overflow:ellipsis;">${p.name}</span>
                    </div>
                `).join('');
                lucide.createIcons();
            } catch(e) { container.innerHTML = '<p style="font-size:12px; color:#ff4444;">Gagal memuat playlist. Coba login ulang.</p>'; }
        }

        async function importSpotifyPlaylist(playlistId, playlistName) {
            showToast(`Mengambil lagu dari ${playlistName}...`, 'info');
            try {
                const data = await SpotifyAuth.fetchWebApi(`/playlists/${playlistId}/tracks`);
                let count = 0;
                data.items.forEach(item => {
                    const t = item.track;
                    if (!t || t.is_local) return;
                    state.playlist.push({
                        id: generateId(), title: t.name, artist: t.artists.map(a=>a.name).join(', '),
                        durationFormatted: formatTime(t.duration_ms / 1000), cover: t.album.images[0]?.url,
                        source: 'spotify', spotifyUri: t.uri
                    });
                    count++;
                });
                Storage.save(); renderPlaylist();
                spotifyModal.classList.remove('active');
                showToast(`${count} lagu berhasil diimpor!`, 'success');
            } catch(e) { showToast('Gagal mengimpor lagu', 'error'); }
        }

        // === EVENT LISTENERS MODAL & BUTTONS ===
        document.getElementById('btn-upload').addEventListener('click', () => uploadModal.classList.add('active'));
        document.getElementById('close-upload').addEventListener('click', () => uploadModal.classList.remove('active'));
        document.getElementById('btn-spotify').addEventListener('click', () => { checkSpotifyAuthState(); spotifyModal.classList.add('active'); });
        document.getElementById('close-spotify').addEventListener('click', () => spotifyModal.classList.remove('active'));
        document.getElementById('btn-login-spotify').addEventListener('click', () => SpotifyAuth.login());
        document.getElementById('btn-logout-spotify').addEventListener('click', () => SpotifyAuth.logout());
        document.getElementById('btn-clear').addEventListener('click', () => { if(confirm('Hapus semua?')) Storage.clear(); });
        
        document.getElementById('file-input').addEventListener('change', (e) => handleFileUpload(e.target.files));

        window.addEventListener('load', () => {
            Storage.load();
            if (getSpotifyTokenFromUrl()) showToast('Spotify Terhubung', 'success');
        });
    </script>
</body>
</html>

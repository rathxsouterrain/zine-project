<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONO | Spotify Premium Player</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <script src="https://sdk.scdn.co/spotify-player.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --black: #0a0a0a; --dark-gray: #141414; --medium-gray: #1f1f1f;
            --light-gray: #2a2a2a; --border-gray: #333333; --text-primary: #ffffff;
            --text-secondary: #a0a0a0; --text-muted: #666666; --accent: #ffffff;
            --spotify-green: #1db954; --error-red: #ff4444; --warning-yellow: #ffa500;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--black); color: var(--text-primary);
            min-height: 100vh; display: flex; justify-content: center; align-items: center;
        }
        .app-container { width: 100%; max-width: 480px; height: 100vh; max-height: 900px; background-color: var(--black); display: flex; flex-direction: column; position: relative; overflow: hidden; }
        .header { padding: 24px 24px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-gray); }
        .logo { font-size: 20px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .logo-icon { width: 24px; height: 24px; background: var(--text-primary); border-radius: 4px; display: flex; align-items: center; justify-content: center; }
        .header-actions { display: flex; gap: 12px; }
        .icon-btn { background: transparent; border: none; color: var(--text-secondary); cursor: pointer; padding: 8px; border-radius: 8px; transition: all 0.2s ease; }
        .user-profile { display: flex; align-items: center; gap: 8px; padding: 4px 12px; background-color: var(--medium-gray); border-radius: 20px; font-size: 13px; }
        .user-avatar { width: 24px; height: 24px; border-radius: 50%; object-fit: cover; }
        .main-content { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 32px; }
        .player-section { display: flex; flex-direction: column; align-items: center; gap: 24px; }
        .album-art-container { position: relative; width: 100%; max-width: 320px; aspect-ratio: 1; border-radius: 12px; overflow: hidden; background-color: var(--medium-gray); box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5); }
        .album-art { width: 100%; height: 100%; object-fit: cover; }
        .track-info { text-align: center; width: 100%; }
        .track-title { font-size: 24px; font-weight: 600; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-artist { font-size: 16px; color: var(--text-secondary); }
        .progress-container { width: 100%; display: flex; flex-direction: column; gap: 8px; }
        .progress-bar-wrapper { width: 100%; height: 4px; background-color: var(--light-gray); border-radius: 2px; cursor: pointer; position: relative; }
        .progress-bar { height: 100%; background-color: var(--text-primary); border-radius: 2px; width: 0%; transition: width 0.1s linear; }
        .time-display { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-muted); }
        .controls { display: flex; align-items: center; justify-content: center; gap: 24px; width: 100%; }
        .control-btn { background: transparent; border: none; color: var(--text-secondary); cursor: pointer; padding: 12px; border-radius: 50%; transition: all 0.2s; }
        .control-btn.play-pause { background-color: var(--text-primary); color: var(--black); padding: 20px; }
        .playlist-section { display: flex; flex-direction: column; gap: 16px; }
        .section-title { font-size: 14px; font-weight: 600; text-transform: uppercase; color: var(--text-secondary); }
        .playlist-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .playlist-item:hover { background-color: var(--medium-gray); }
        .playlist-item.active { background-color: var(--light-gray); border-left: 3px solid white; }
        .playlist-item-art { width: 48px; height: 48px; border-radius: 6px; overflow: hidden; }
        .playlist-item-info { flex: 1; min-width: 0; }
        .playlist-item-title { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .playlist-item-artist { font-size: 12px; color: var(--text-secondary); }
        .action-buttons { display: flex; gap: 12px; }
        .btn { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid var(--border-gray); background: var(--medium-gray); color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-spotify { background-color: var(--spotify-green); color: black; border: none; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .modal-overlay.active { display: flex; }
        .modal { background: var(--dark-gray); border-radius: 16px; width: 100%; max-width: 400px; padding: 24px; border: 1px solid var(--border-gray); }
        .tabs { display: flex; gap: 8px; margin-bottom: 16px; border-bottom: 1px solid var(--border-gray); padding-bottom: 12px; }
        .tab { padding: 8px 12px; background: transparent; border: none; color: var(--text-secondary); cursor: pointer; font-size: 13px; }
        .tab.active { color: white; border-bottom: 2px solid white; }
        .input-field { width: 100%; padding: 12px; background: var(--medium-gray); border: 1px solid var(--border-gray); border-radius: 8px; color: white; margin-bottom: 12px; }
        .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--medium-gray); padding: 12px 24px; border-radius: 8px; transition: 0.3s; opacity: 0; z-index: 2000; }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .visualizer { position: absolute; bottom: 0; left: 0; right: 0; height: 60px; display: flex; align-items: flex-end; justify-content: center; gap: 3px; opacity: 0; transition: 0.3s; }
        .visualizer.active { opacity: 1; }
        .bar { width: 4px; background: rgba(255,255,255,0.6); border-radius: 2px; animation: bounce 0s infinite; }
        @keyframes bounce { 0%, 100% { height: 4px; } 50% { height: 40px; } }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="logo"><div class="logo-icon"><i data-lucide="disc-3" style="width:16px;color:black"></i></div>MONO</div>
            <div class="header-actions">
                <div class="user-profile" id="user-profile" style="display:none">
                    <img src="" id="user-avatar" class="user-avatar">
                    <span id="user-name">User</span>
                </div>
                <button class="icon-btn" id="btn-clear"><i data-lucide="trash-2"></i></button>
            </div>
        </header>

        <main class="main-content">
            <section class="player-section">
                <div class="album-art-container">
                    <div class="album-art-placeholder" id="album-art"><i data-lucide="music" style="width:64px;height:64px;opacity:0.3"></i></div>
                    <div class="visualizer" id="visualizer"></div>
                </div>
                <div class="track-info">
                    <h1 class="track-title" id="track-title">Pilih Lagu</h1>
                    <p class="track-artist" id="track-artist">Daftar putar kosong</p>
                </div>
                <div class="progress-container">
                    <div class="progress-bar-wrapper" id="progress-wrapper"><div class="progress-bar" id="progress-bar"></div></div>
                    <div class="time-display"><span id="current-time">0:00</span><span id="duration">0:00</span></div>
                </div>
                <div class="controls">
                    <button class="control-btn" id="btn-shuffle"><i data-lucide="shuffle"></i></button>
                    <button class="control-btn" id="btn-prev"><i data-lucide="skip-back"></i></button>
                    <button class="control-btn play-pause" id="btn-play"><i data-lucide="play" id="icon-play"></i></button>
                    <button class="control-btn" id="btn-next"><i data-lucide="skip-forward"></i></button>
                    <button class="control-btn" id="btn-repeat"><i data-lucide="repeat"></i></button>
                </div>
            </section>

            <section class="playlist-section">
                <div class="action-buttons">
                    <button class="btn" id="btn-upload"><i data-lucide="upload"></i> File</button>
                    <button class="btn btn-spotify" id="btn-spotify"><i data-lucide="link"></i> Spotify</button>
                </div>
                <div class="playlist" id="playlist"></div>
            </section>
        </main>
    </div>

    <audio id="audio-player"></audio>

    <div class="modal-overlay" id="spotify-modal">
        <div class="modal">
            <div class="tabs">
                <button class="tab active" data-tab="login">Login</button>
                <button class="tab" data-tab="import">Import URL</button>
                <button class="tab" data-tab="playlists">Playlists</button>
            </div>
            <div id="tab-login" class="tab-content">
                <button class="btn btn-spotify" id="btn-login-spotify" style="width:100%">Login Spotify Premium</button>
            </div>
            <div id="tab-import" class="tab-content" style="display:none">
                <input type="text" class="input-field" id="spotify-url" placeholder="Paste URL Track / Album / Artist">
                <button class="btn btn-spotify" id="btn-import-url" style="width:100%">Import ke Antrian</button>
            </div>
            <div id="tab-playlists" class="tab-content" style="display:none">
                <div id="playlists-grid">Memuat...</div>
            </div>
            <button class="btn btn-secondary" id="close-spotify" style="margin-top:12px;width:100%">Tutup</button>
        </div>
    </div>

    <div class="modal-overlay" id="upload-modal">
        <div class="modal">
            <input type="file" id="file-input" multiple style="display:none">
            <label for="file-input" class="btn" style="height:100px;border:2px dashed #333">Klik untuk Upload MP3</label>
            <button class="btn" id="close-upload" style="margin-top:12px;width:100%">Tutup</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const SPOTIFY_CONFIG = {
            clientId: '9b38509a05264494a417c63ebbe51d78',
            redirectUri: window.location.origin + window.location.pathname,
            scope: 'streaming user-read-email user-read-private playlist-read-private user-modify-playback-state user-read-playback-state',
            authEndpoint: 'https://accounts.spotify.com/authorize',
            tokenEndpoint: 'https://accounts.spotify.com/api/token',
            apiEndpoint: 'https://api.spotify.com/v1'
        };

        let state = {
            playlist: [], currentIndex: -1, isPlaying: false,
            accessToken: localStorage.getItem('spotify_access_token'),
            player: null, deviceId: null, positionInterval: null
        };

        const audio = document.getElementById('audio-player');
        const progressBar = document.getElementById('progress-bar');
        const currentTimeEl = document.getElementById('current-time');
        const durationEl = document.getElementById('duration');

        lucide.createIcons();

        // UI Refresh Posisi (REAL TIME FIX)
        function startPositionTimer() {
            stopPositionTimer();
            state.positionInterval = setInterval(() => {
                if (state.isPlaying) {
                    if (state.playlist[state.currentIndex]?.source === 'spotify' && state.player) {
                        state.player.getCurrentState().then(s => {
                            if (s) updateUIProgress(s.position, s.duration);
                        });
                    } else {
                        updateUIProgress(audio.currentTime * 1000, audio.duration * 1000);
                    }
                }
            }, 500);
        }

        function stopPositionTimer() {
            clearInterval(state.positionInterval);
        }

        function updateUIProgress(pos, dur) {
            if (!dur) return;
            const percent = (pos / dur) * 100;
            progressBar.style.width = `${percent}%`;
            currentTimeEl.textContent = formatTimeMs(pos);
            durationEl.textContent = formatTimeMs(dur);
        }

        function formatTimeMs(ms) {
            const s = Math.floor(ms / 1000);
            return `${Math.floor(s / 60)}:${(s % 60).toString().padStart(2, '0')}`;
        }

        // Spotify Logic
        window.onSpotifyWebPlaybackSDKReady = () => {
            if (state.accessToken) initSpotifyPlayer();
        };

        function initSpotifyPlayer() {
            state.player = new Spotify.Player({
                name: 'MONO Player',
                getOAuthToken: cb => cb(state.accessToken)
            });

            state.player.addListener('ready', ({ device_id }) => {
                state.deviceId = device_id;
                showToast('Spotify Connected', 'success');
            });

            state.player.addListener('player_state_changed', s => {
                if (!s) return;
                state.isPlaying = !s.paused;
                updatePlayButton();
                if (s.track_window.current_track) {
                    const t = s.track_window.current_track;
                    document.getElementById('track-title').textContent = t.name;
                    document.getElementById('track-artist').textContent = t.artists[0].name;
                    document.getElementById('album-art').innerHTML = `<img src="${t.album.images[0].url}" class="album-art">`;
                }
            });

            state.player.connect();
        }

        async function importFromUrl() {
            const url = document.getElementById('spotify-url').value;
            const match = url.match(/(track|album|artist)\/([a-zA-Z0-9]+)/);
            if (!match) return showToast('URL tidak valid', 'error');

            const [_, type, id] = match;
            try {
                const res = await fetch(`${SPOTIFY_CONFIG.apiEndpoint}/${type}s/${id}${type === 'album' ? '/tracks' : type === 'artist' ? '/top-tracks?market=ID' : ''}`, {
                    headers: { 'Authorization': `Bearer ${state.accessToken}` }
                });
                const data = await res.json();
                
                let tracks = [];
                if (type === 'track') tracks = [data];
                else if (type === 'album') tracks = data.items;
                else if (type === 'artist') tracks = data.tracks;

                tracks.forEach(t => {
                    state.playlist.push({
                        title: t.name,
                        artist: t.artists ? t.artists[0].name : 'Unknown',
                        source: 'spotify',
                        spotifyId: t.id,
                        durationFormatted: formatTimeMs(t.duration_ms || 0),
                        cover: data.images ? data.images[0].url : (t.album ? t.album.images[0].url : null)
                    });
                });

                renderPlaylist();
                showToast(`Berhasil import ${tracks.length} lagu`, 'success');
                document.getElementById('spotify-url').value = '';
            } catch (e) {
                showToast('Gagal import data', 'error');
            }
        }

        // Controls & UI Helpers
        function updatePlayButton() {
            const icon = document.getElementById('icon-play');
            icon.setAttribute('data-lucide', state.isPlaying ? 'pause' : 'play');
            lucide.createIcons();
            if (state.isPlaying) startPositionTimer();
            else stopPositionTimer();
        }

        function renderPlaylist() {
            const container = document.getElementById('playlist');
            container.innerHTML = state.playlist.map((t, i) => `
                <div class="playlist-item ${i === state.currentIndex ? 'active' : ''}" onclick="playTrack(${i})">
                    <div class="playlist-item-art">
                        ${t.cover ? `<img src="${t.cover}" style="width:100%">` : '<i data-lucide="music"></i>'}
                    </div>
                    <div class="playlist-item-info">
                        <div class="playlist-item-title">${t.title}</div>
                        <div class="playlist-item-artist">${t.artist}</div>
                    </div>
                    <div style="font-size:12px;color:gray">${t.durationFormatted}</div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        async function playTrack(index) {
            state.currentIndex = index;
            const track = state.playlist[index];
            
            if (track.source === 'spotify') {
                audio.pause();
                await fetch(`${SPOTIFY_CONFIG.apiEndpoint}/me/player/play?device_id=${state.deviceId}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${state.accessToken}` },
                    body: JSON.stringify({ uris: [`spotify:track:${track.spotifyId}`] })
                });
            } else {
                if (state.player) state.player.pause();
                audio.src = track.url;
                audio.play();
                state.isPlaying = true;
                updatePlayButton();
            }
            renderPlaylist();
        }

        function showToast(msg, type) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = `toast show ${type}`;
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        // Events
        document.getElementById('btn-play').onclick = () => {
            if (state.playlist[state.currentIndex]?.source === 'spotify') state.player.togglePlay();
            else audio.paused ? audio.play() : audio.pause();
            state.isPlaying = !state.isPlaying;
            updatePlayButton();
        };

        document.getElementById('btn-spotify').onclick = () => document.getElementById('spotify-modal').classList.add('active');
        document.getElementById('close-spotify').onclick = () => document.getElementById('spotify-modal').classList.remove('active');
        document.getElementById('btn-import-url').onclick = importFromUrl;
        
        document.querySelectorAll('.tab').forEach(t => {
            t.onclick = () => {
                document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(x => x.style.display = 'none');
                t.classList.add('active');
                document.getElementById(`tab-${t.dataset.tab}`).style.display = 'block';
            };
        });

        document.getElementById('btn-login-spotify').onclick = () => {
            const url = `${SPOTIFY_CONFIG.authEndpoint}?client_id=${SPOTIFY_CONFIG.clientId}&response_type=token&redirect_uri=${encodeURIComponent(SPOTIFY_CONFIG.redirectUri)}&scope=${encodeURIComponent(SPOTIFY_CONFIG.scope)}`;
            window.location.href = url;
        };

        // Handle Hash Token
        const hash = window.location.hash.substring(1).split('&').reduce((a, b) => {
            const parts = b.split('=');
            a[parts[0]] = decodeURIComponent(parts[1]);
            return a;
        }, {});

        if (hash.access_token) {
            state.accessToken = hash.access_token;
            localStorage.setItem('spotify_access_token', hash.access_token);
            window.location.hash = '';
            document.getElementById('user-profile').style.display = 'flex';
        }
    </script>
</body>
</html>

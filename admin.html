<!-- admin.html - Panel Admin -->
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Stream Video</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            color: #fff;
            min-height: 100vh;
        }

        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 50px;
            padding-bottom: 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-size: 36px;
            font-weight: 300;
            letter-spacing: -1px;
        }

        .btn {
            padding: 12px 30px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: #fff;
            color: #000;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.2);
        }

        .btn-danger {
            background: rgba(255, 0, 0, 0.2);
            color: #ff4444;
            border: 1px solid rgba(255, 0, 0, 0.3);
        }

        .btn-danger:hover {
            background: rgba(255, 0, 0, 0.3);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        /* Upload Form */
        .upload-section {
            margin-bottom: 50px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            opacity: 0.7;
        }

        input, select, textarea {
            padding: 15px 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 16px;
            transition: all 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.08);
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }

        .file-input-wrapper input[type=file] {
            position: absolute;
            left: -9999px;
        }

        .file-label {
            display: block;
            padding: 40px;
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .file-label:hover {
            border-color: rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.05);
        }

        /* Video List */
        .video-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .video-item {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 20px;
            border-radius: 16px;
            transition: all 0.3s;
        }

        .video-item:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(10px);
        }

        .video-thumb {
            width: 120px;
            height: 68px;
            background: #2a2a2a;
            border-radius: 8px;
            object-fit: cover;
            flex-shrink: 0;
        }

        .video-details {
            flex: 1;
        }

        .video-title {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 5px;
        }

        .video-category {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            font-size: 12px;
            text-transform: uppercase;
        }

        .video-actions {
            display: flex;
            gap: 10px;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        .icon-btn.delete:hover {
            background: rgba(255, 0, 0, 0.3);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            z-index: 1000;
            padding: 20px;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            width: 100%;
            max-width: 500px;
            padding: 40px;
            border-radius: 24px;
            transform: scale(0.9);
            transition: all 0.3s;
        }

        .modal-overlay.active .modal {
            transform: scale(1);
        }

        .modal h2 {
            margin-bottom: 30px;
            font-weight: 300;
        }

        .modal-actions {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .modal-actions .btn {
            flex: 1;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 16px 32px;
            border-radius: 12px;
            transform: translateX(400px);
            transition: all 0.4s ease;
            z-index: 2000;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.success {
            background: rgba(0, 255, 0, 0.15);
            border: 1px solid rgba(0, 255, 0, 0.3);
            color: #4ade80;
        }

        .toast.error {
            background: rgba(255, 0, 0, 0.15);
            border: 1px solid rgba(255, 0, 0, 0.3);
            color: #f87171;
        }

        /* Loading */
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: inline-block;
            margin-left: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            opacity: 0.5;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.3;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Admin Panel</h1>
            <button class="btn btn-primary" onclick="showUploadForm()">
                + Upload Video
            </button>
        </div>

        <!-- Upload Form Section -->
        <div class="upload-section glass" id="uploadForm" style="display: none; padding: 30px; margin-bottom: 30px;">
            <h3 style="margin-bottom: 20px;">Upload Video Baru</h3>
            <form id="videoForm" onsubmit="handleUpload(event)">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Judul Video</label>
                        <input type="text" id="videoTitle" placeholder="Masukkan judul video" required>
                    </div>
                    <div class="form-group">
                        <label>Kategori</label>
                        <select id="videoCategory" required>
                            <option value="">Pilih Kategori</option>
                            <option value="hijab">Hijab</option>
                            <option value="bocil">Bocil</option>
                            <option value="abg">ABG</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group" style="margin-bottom: 20px;">
                    <label>Thumbnail URL (Google Drive)</label>
                    <input type="url" id="thumbnailUrl" placeholder="https://drive.google.com/uc?export=view&id=..." required>
                    <small style="opacity: 0.5; margin-top: 5px; display: block;">Paste link Google Drive yang sudah di-share publicly</small>
                </div>

                <div class="form-group" style="margin-bottom: 20px;">
                    <label>Video URL (Google Drive)</label>
                    <input type="url" id="videoUrl" placeholder="https://drive.google.com/file/d/..." required>
                </div>

                <div style="display: flex; gap: 15px;">
                    <button type="submit" class="btn btn-primary">
                        Simpan Video
                    </button>
                    <button type="button" class="btn btn-secondary" onclick="hideUploadForm()">
                        Batal
                    </button>
                </div>
            </form>
        </div>

        <!-- Video List -->
        <div class="video-list" id="videoList">
            <!-- Videos will be loaded here -->
        </div>

        <!-- Empty State -->
        <div class="empty-state" id="emptyState" style="display: none;">
            <svg viewBox="0 0 24 24" fill="white"><path d="M18 3v2h-2V3H8v2H6V3H4v18h2v-2h2v2h8v-2h2v2h2V3h-2zM8 17H6v-2h2v2zm0-4H6v-2h2v2zm0-4H6V7h2v2zm10 8h-2v-2h2v2zm0-4h-2v-2h2v2zm0-4h-2V7h2v2z"/></svg>
            <h3>Belum ada video</h3>
            <p>Upload video pertama Anda</p>
        </div>
    </div>

    <!-- Edit Modal -->
    <div class="modal-overlay" id="editModal">
        <div class="modal glass">
            <h2>Edit Video</h2>
            <form id="editForm" onsubmit="handleEdit(event)">
                <input type="hidden" id="editId">
                <div class="form-group" style="margin-bottom: 15px;">
                    <label>Judul Video</label>
                    <input type="text" id="editTitle" required>
                </div>
                <div class="form-group" style="margin-bottom: 15px;">
                    <label>Kategori</label>
                    <select id="editCategory" required>
                        <option value="hijab">Hijab</option>
                        <option value="bocil">Bocil</option>
                        <option value="abg">ABG</option>
                    </select>
                </div>
                <div class="form-group" style="margin-bottom: 15px;">
                    <label>Thumbnail URL</label>
                    <input type="url" id="editThumbnail" required>
                </div>
                <div class="form-group" style="margin-bottom: 15px;">
                    <label>Video URL</label>
                    <input type="url" id="editVideoUrl" required>
                </div>
                <div class="modal-actions">
                    <button type="submit" class="btn btn-primary">Simpan Perubahan</button>
                    <button type="button" class="btn btn-secondary" onclick="closeEditModal()">Batal</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Delete Modal -->
    <div class="modal-overlay" id="deleteModal">
        <div class="modal glass">
            <h2>Hapus Video?</h2>
            <p style="opacity: 0.7; margin-bottom: 30px;">Video yang dihapus tidak dapat dikembalikan. Lanjutkan?</p>
            <div class="modal-actions">
                <button class="btn btn-danger" onclick="confirmDelete()">Ya, Hapus</button>
                <button class="btn btn-secondary" onclick="closeDeleteModal()">Batal</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast glass" id="toast"></div>

    <script>
        // Konfigurasi
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby8xcaKjjJ-niqiIlRqY-4QF-qwWvDTyi4d37vnew_UJEuGZp_1MucDfht_RCUKTHXakA/exec'; // Ganti dengan URL Web App Google Apps Script
        
        let videos = [];
        let deleteId = null;

        // Load videos
        async function loadVideos() {
            try {
                // Simulasi data - Ganti dengan fetch ke Google Apps Script
                // const response = await fetch(`${SCRIPT_URL}?action=getVideos`);
                // videos = await response.json();
                
                videos = [
                    {
                        id: 1,
                        title: "Video Tutorial Hijab Modern",
                        category: "hijab",
                        thumbnail: "https://via.placeholder.com/120x68",
                        videoUrl: "https://drive.google.com/file/d/EXAMPLE/view",
                        date: "2024-01-15"
                    },
                    {
                        id: 2,
                        title: "Konten Bocil Lucu",
                        category: "bocil",
                        thumbnail: "https://via.placeholder.com/120x68",
                        videoUrl: "https://drive.google.com/file/d/EXAMPLE/view",
                        date: "2024-01-14"
                    }
                ];
                
                renderVideos();
            } catch (error) {
                showToast('Gagal memuat data', 'error');
            }
        }

        function renderVideos() {
            const list = document.getElementById('videoList');
            const emptyState = document.getElementById('emptyState');
            
            if (videos.length === 0) {
                list.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }
            
            list.style.display = 'flex';
            emptyState.style.display = 'none';
            
            list.innerHTML = videos.map(video => `
                <div class="video-item glass">
                    <img src="${video.thumbnail}" class="video-thumb" alt="${video.title}">
                    <div class="video-details">
                        <div class="video-title">${video.title}</div>
                        <span class="video-category">${video.category}</span>
                        <div style="font-size: 12px; opacity: 0.5; margin-top: 5px;">
                            ${video.date} • ID: ${video.id}
                        </div>
                    </div>
                    <div class="video-actions">
                        <button class="icon-btn" onclick="openEditModal(${video.id})" title="Edit">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                        </button>
                        <button class="icon-btn delete" onclick="openDeleteModal(${video.id})" title="Hapus">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function showUploadForm() {
            document.getElementById('uploadForm').style.display = 'block';
            document.getElementById('uploadForm').scrollIntoView({ behavior: 'smooth' });
        }

        function hideUploadForm() {
            document.getElementById('uploadForm').style.display = 'none';
            document.getElementById('videoForm').reset();
        }

        async function handleUpload(e) {
            e.preventDefault();
            
            const data = {
                action: 'addVideo',
                title: document.getElementById('videoTitle').value,
                category: document.getElementById('videoCategory').value,
                thumbnail: document.getElementById('thumbnailUrl').value,
                videoUrl: document.getElementById('videoUrl').value,
                date: new Date().toISOString().split('T')[0]
            };
            
            try {
                // Ganti dengan fetch ke Google Apps Script
                // await fetch(SCRIPT_URL, {
                //     method: 'POST',
                //     body: JSON.stringify(data)
                // });
                
                // Simulasi
                videos.push({
                    id: Date.now(),
                    ...data
                });
                
                showToast('Video berhasil ditambahkan!', 'success');
                hideUploadForm();
                renderVideos();
            } catch (error) {
                showToast('Gagal menambahkan video', 'error');
            }
        }

        function openEditModal(id) {
            const video = videos.find(v => v.id === id);
            if (!video) return;
            
            document.getElementById('editId').value = id;
            document.getElementById('editTitle').value = video.title;
            document.getElementById('editCategory').value = video.category;
            document.getElementById('editThumbnail').value = video.thumbnail;
            document.getElementById('editVideoUrl').value = video.videoUrl;
            
            document.getElementById('editModal').classList.add('active');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
        }

        async function handleEdit(e) {
            e.preventDefault();
            
            const id = parseInt(document.getElementById('editId').value);
            const data = {
                action: 'updateVideo',
                id: id,
                title: document.getElementById('editTitle').value,
                category: document.getElementById('editCategory').value,
                thumbnail: document.getElementById('editThumbnail').value,
                videoUrl: document.getElementById('editVideoUrl').value
            };
            
            try {
                // await fetch(SCRIPT_URL, {
                //     method: 'POST',
                //     body: JSON.stringify(data)
                // });
                
                const index = videos.findIndex(v => v.id === id);
                if (index !== -1) {
                    videos[index] = { ...videos[index], ...data };
                }
                
                showToast('Video berhasil diupdate!', 'success');
                closeEditModal();
                renderVideos();
            } catch (error) {
                showToast('Gagal mengupdate video', 'error');
            }
        }

        function openDeleteModal(id) {
            deleteId = id;
            document.getElementById('deleteModal').classList.add('active');
        }

        function closeDeleteModal() {
            document.getElementById('deleteModal').classList.remove('active');
            deleteId = null;
        }

        async function confirmDelete() {
            if (!deleteId) return;
            
            try {
                // await fetch(SCRIPT_URL, {
                //     method: 'POST',
                //     body: JSON.stringify({ action: 'deleteVideo', id: deleteId })
                // });
                
                videos = videos.filter(v => v.id !== deleteId);
                
                showToast('Video berhasil dihapus!', 'success');
                closeDeleteModal();
                renderVideos();
            } catch (error) {
                showToast('Gagal menghapus video', 'error');
            }
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast glass ${type} show`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // Init
        loadVideos();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Stream Video</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            color: #fff;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
        }

        h1 {
            font-size: 36px;
            font-weight: 300;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            opacity: 0.7;
            margin-bottom: 8px;
        }

        input, select {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 16px;
        }

        input:focus, select:focus {
            outline: none;
            border-color: rgba(255,255,255,0.3);
        }

        .btn {
            padding: 15px 30px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #fff;
            color: #000;
        }

        .btn-primary:hover { transform: translateY(-2px); }

        .btn-danger {
            background: rgba(255,0,0,0.2);
            color: #ff4444;
            margin-left: 10px;
        }

        .video-list {
            margin-top: 40px;
        }

        .video-item {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .video-thumb {
            width: 120px;
            height: 68px;
            background: #2a2a2a;
            border-radius: 8px;
            object-fit: cover;
        }

        .video-info { flex: 1; }

        .video-title { font-weight: 500; margin-bottom: 5px; }

        .video-cat {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            font-size: 12px;
            text-transform: uppercase;
        }

        .empty {
            text-align: center;
            padding: 60px;
            opacity: 0.5;
        }

        .toast {
            position: fixed;
            bottom: 30px; right: 30px;
            padding: 16px 32px;
            border-radius: 12px;
            transform: translateX(400px);
            transition: all 0.4s;
        }

        .toast.show { transform: translateX(0); }
        .toast.success { background: rgba(0,255,0,0.2); color: #4ade80; }
        .toast.error { background: rgba(255,0,0,0.2); color: #f87171; }
    </style>
</head>
<body>

    <div class="glass" style="max-width: 800px; margin: 0 auto;">
        <h1>Admin Panel</h1>
        
        <form id="uploadForm">
            <div class="form-group">
                <label>Judul Video</label>
                <input type="text" id="title" placeholder="Masukkan judul" required>
            </div>
            
            <div class="form-group">
                <label>Kategori</label>
                <select id="category" required>
                    <option value="">Pilih...</option>
                    <option value="hijab">Hijab</option>
                    <option value="bocil">Bocil</option>
                    <option value="abg">ABG</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Thumbnail URL (Google Drive)</label>
                <input type="url" id="thumbnail" placeholder="https://drive.google.com/uc?export=view&id=..." required>
            </div>
            
            <div class="form-group">
                <label>Video URL (Google Drive)</label>
                <input type="url" id="videoUrl" placeholder="https://drive.google.com/file/d/..." required>
            </div>
            
            <button type="submit" class="btn btn-primary">+ Tambah Video</button>
        </form>

        <div class="video-list" id="videoList">
            <!-- List video di sini -->
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // ============================================
        // GANTI URL INI SAMA DENGAN YANG DI INDEX.HTML
        // ============================================
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw_jtcQH55fzoBkUzMh58gUqoh3QuwvRQf8a95cqQqS93yBndlbIII7PFGY2ZwzS_KefA/exec';
        
        let videos = [];

        // Load semua video
        async function loadVideos() {
            try {
                const res = await fetch(`${SCRIPT_URL}?action=getVideos`);
                const data = await res.json();
                
                if (data.success) {
                    videos = data.data;
                    renderList();
                }
            } catch (err) {
                showToast('Gagal memuat data', 'error');
            }
        }

        // Render list video
        function renderList() {
            const list = document.getElementById('videoList');
            
            if (videos.length === 0) {
                list.innerHTML = '<div class="empty">Belum ada video</div>';
                return;
            }
            
            list.innerHTML = '<h2 style="margin: 30px 0 20px;">Daftar Video</h2>' +
                videos.map(v => `
                    <div class="video-item">
                        <img src="${v.thumbnail}" class="video-thumb" onerror="this.src='https://via.placeholder.com/120x68'">
                        <div class="video-info">
                            <div class="video-title">${v.title}</div>
                            <span class="video-cat">${v.category}</span>
                            <div style="font-size: 12px; opacity: 0.5; margin-top: 5px;">${v.date}</div>
                        </div>
                        <button class="btn btn-danger" onclick="deleteVideo('${v.id}')">Hapus</button>
                    </div>
                `).join('');
        }

        // Upload video baru
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const data = {
                action: 'addVideo',
                title: document.getElementById('title').value,
                category: document.getElementById('category').value,
                thumbnail: document.getElementById('thumbnail').value,
                videoUrl: document.getElementById('videoUrl').value
            };
            
            try {
                const res = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify(data)
                });
                
                const result = await res.json();
                
                if (result.success) {
                    showToast('Video ditambahkan!', 'success');
                    document.getElementById('uploadForm').reset();
                    loadVideos(); // Refresh list
                } else {
                    throw new Error(result.error);
                }
            } catch (err) {
                showToast('Error: ' + err.message, 'error');
            }
        });

        // Hapus video
        async function deleteVideo(id) {
            if (!confirm('Yakin hapus video ini?')) return;
            
            try {
                const res = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'deleteVideo', id: id })
                });
                
                const result = await res.json();
                
                if (result.success) {
                    showToast('Video dihapus', 'success');
                    loadVideos();
                }
            } catch (err) {
                showToast('Gagal menghapus', 'error');
            }
        }

        function showToast(msg, type = 'success') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = `toast ${type} show`;
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        // Init
        loadVideos();
    </script>

</body>
</html>

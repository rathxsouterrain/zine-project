<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Card Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background-color: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            font-size: 24px;
            margin-bottom: 40px;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 3px;
            border-bottom: 2px solid #333;
            padding-bottom: 20px;
        }

        .input-section {
            background: #111;
            border: 1px solid #333;
            padding: 30px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #888;
        }

        input[type="text"],
        input[type="url"],
        select,
        textarea {
            width: 100%;
            padding: 15px;
            background: #0a0a0a;
            border: 1px solid #333;
            color: #fff;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="url"]:focus,
        select:focus,
        textarea:focus {
            border-color: #555;
        }

        textarea {
            min-height: 80px;
            resize: vertical;
        }

        .generate-btn {
            width: 100%;
            padding: 18px;
            background: #fff;
            color: #000;
            border: none;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .generate-btn:hover {
            background: #ccc;
        }

        .output-section {
            background: #111;
            border: 1px solid #333;
            padding: 30px;
        }

        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #333;
        }

        .output-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #888;
        }

        .copy-btn {
            padding: 10px 25px;
            background: transparent;
            border: 1px solid #555;
            color: #fff;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .copy-btn:hover {
            background: #fff;
            color: #000;
            border-color: #fff;
        }

        .copy-btn.copied {
            background: #2d5016;
            border-color: #2d5016;
            color: #fff;
        }

        pre {
            background: #0a0a0a;
            border: 1px solid #222;
            padding: 25px;
            overflow-x: auto;
            font-size: 13px;
            line-height: 1.6;
            color: #aaa;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .hint {
            font-size: 11px;
            color: #555;
            margin-top: 8px;
            font-style: italic;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 600px) {
            .row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>/// Video Card Generator ///</h1>
        
        <div class="input-section">
            <div class="row">
                <div class="form-group">
                    <label for="category">Kategori</label>
                    <select id="category">
                        <option value="hijab">hijab</option>
                        <option value="bocil">bocil</option>
                        <option value="abg">abg</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="title">Judul Video</label>
                    <input type="text" id="title" placeholder="Contoh: DI SEPONG PACAR GURIH BIKIN NAGIH">
                </div>
            </div>

            <div class="form-group">
                <label for="jumpshare">Link Jumpshare</label>
                <input type="url" id="jumpshare" placeholder="https://jumpshare.com/v/...">
                <div class="hint">Paste link video dari Jumpshare</div>
            </div>

            <div class="row">
                <div class="form-group">
                    <label for="driveId">ID Google Drive Thumbnail</label>
                    <input type="text" id="driveId" placeholder="Contoh: 1ABC123xyz...">
                    <div class="hint">Ambil dari URL: drive.google.com/file/d/ID_INI/view</div>
                </div>
                
                <div class="form-group">
                    <label for="shopee">Link Shopee (Opsional)</label>
                    <input type="url" id="shopee" value="https://s.shopee.co.id/1gEa1RAN5w">
                </div>
            </div>

            <div class="form-group">
                <label for="displayTitle">Judul Tampilan (H3)</label>
                <input type="text" id="displayTitle" placeholder="Contoh: CEWEK ABG COLMEK BODY TOBRUT">
            </div>

            <button class="generate-btn" onclick="generateCode()">Generate Kode</button>
        </div>

        <div class="output-section">
            <div class="output-header">
                <span class="output-title">/// Output HTML</span>
                <button class="copy-btn" id="copyBtn" onclick="copyCode()">Copy</button>
            </div>
            <pre id="output"><!-- Kode akan muncul di sini --></pre>
        </div>
    </div>

    <script>
        function generateCode() {
            const category = document.getElementById('category').value;
            const title = document.getElementById('title').value || 'Judul Video';
            const jumpshare = document.getElementById('jumpshare').value || '#';
            const driveId = document.getElementById('driveId').value || 'ID_PLACEHOLDER';
            const shopee = document.getElementById('shopee').value || 'https://s.shopee.co.id/1gEa1RAN5w';
            const displayTitle = document.getElementById('displayTitle').value || title.toUpperCase();
            
            const today = new Date();
            const dateStr = today.getDate() + ' ' + today.toLocaleString('id-ID', { month: 'short' });

            const code = `<div class="video-card" 
     data-category="${category}" 
     data-video-url="${jumpshare}"
     data-shopee="${shopee}"
     data-title="${title}">
    <div class="video-thumbnail">
        <!-- GANTI SRC DI SINI -->
        <img src="https://drive.google.com/thumbnail?id=${driveId}&sz=w300-h450" 
             alt="${title}"
             onerror="this.src='https://via.placeholder.com/300x450/1a1a1a/666?text=No+Image'">
        <div class="play-overlay"><i class="fas fa-play"></i></div>
        <div class="shopee-overlay"><i class="fas fa-shopping-bag"></i><span>Ke Shopee...</span></div>
        <div class="ready-indicator"></div>
    </div>
    <span class="category-badge">${category}</span>
    <div class="video-info">
        <h3>${displayTitle}</h3>
        <div class="video-meta">
            <span><i class="fas fa-calendar"></i> ${dateStr}</span>
            <span class="ready-text" style="display:none; color: var(--accent);"><i class="fas fa-check"></i> Ready</span>
        </div>
    </div>
</div>`;

            document.getElementById('output').textContent = code;
        }

        function copyCode() {
            const output = document.getElementById('output').textContent;
            const copyBtn = document.getElementById('copyBtn');
            
            if (!output.trim()) {
                alert('Generate kode terlebih dahulu!');
                return;
            }
            
            navigator.clipboard.writeText(output).then(() => {
                copyBtn.textContent = 'Copied!';
                copyBtn.classList.add('copied');
                
                setTimeout(() => {
                    copyBtn.textContent = 'Copy';
                    copyBtn.classList.remove('copied');
                }, 2000);
            }).catch(err => {
                const textarea = document.createElement('textarea');
                textarea.value = output;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                
                copyBtn.textContent = 'Copied!';
                copyBtn.classList.add('copied');
                
                setTimeout(() => {
                    copyBtn.textContent = 'Copy';
                    copyBtn.classList.remove('copied');
                }, 2000);
            });
        }

        window.onload = function() {
            document.getElementById('title').value = 'DI SEPONG PACAR GURIH BIKIN NAGIH';
            document.getElementById('displayTitle').value = 'CEWEK ABG COLMEK BODY TOBRUT';
            generateCode();
        };
    </script>
</body>
</html>

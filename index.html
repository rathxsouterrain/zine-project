<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cassette Generator</title>

<style>

body{
background:#0b0b0b;
font-family:Arial;
color:white;
display:flex;
flex-direction:column;
align-items:center;
padding:40px;
}

/* glass panel */

.panel{
background:rgba(255,255,255,0.06);
backdrop-filter:blur(16px);
border:1px solid rgba(255,255,255,0.15);
padding:25px;
border-radius:16px;
width:520px;
text-align:center;
box-shadow:0 10px 40px rgba(0,0,0,0.7);
}

/* glass buttons */

button{
padding:10px 16px;
margin:5px;
border-radius:10px;
border:1px solid rgba(255,255,255,0.2);
background:rgba(255,255,255,0.08);
color:white;
cursor:pointer;
transition:0.25s;
}

button:hover{
background:rgba(255,255,255,0.2);
transform:translateY(-2px);
}

input{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid rgba(255,255,255,0.2);
background:rgba(255,255,255,0.08);
color:white;
margin-bottom:10px;
}

/* cassette preview */

.cassette{
margin-top:20px;
width:320px;
height:200px;
background:#222;
border-radius:12px;
transform:perspective(800px) rotateX(10deg);
position:relative;
box-shadow:0 20px 40px rgba(0,0,0,0.6);
}

.cassette img{
position:absolute;
top:30px;
left:30px;
width:120px;
height:120px;
object-fit:cover;
}

/* canvas */

canvas{
margin-top:20px;
background:white;
border-radius:8px;
}

</style>
</head>

<body>

<div class="panel">

<h2>Cassette Cover Generator</h2>

<input id="link" placeholder="Paste Spotify / Bandcamp album link">

<input id="token" placeholder="Spotify Access Token (only if Spotify link)">

<input type="file" id="upload">

<button onclick="loadAlbum()">Load Album</button>

<button onclick="render()">Generate J-Card</button>

<button onclick="downloadPNG()">Download PNG</button>

<button onclick="downloadPDF()">Download PDF</button>

</div>

<div class="cassette">
<img id="preview">
</div>

<canvas id="canvas" width="1200" height="450"></canvas>

<script>

let tracks=[]
let cover=""
let title="Album Title"
let textX=380
let textY=60

/* upload custom cover */

upload.onchange = e =>{

let reader = new FileReader()

reader.onload = ev =>{

cover = ev.target.result
preview.src = cover

}

reader.readAsDataURL(e.target.files[0])

}

/* detect link */

async function loadAlbum(){

let url = link.value

if(url.includes("spotify")){

loadSpotify(url)

}

else if(url.includes("bandcamp")){

loadBandcamp(url)

}

}

/* spotify parser */

async function loadSpotify(url){

let id = url.split("/album/")[1].split("?")[0]

let tokenValue = token.value

let res = await fetch(

"https://api.spotify.com/v1/albums/"+id,

{
headers:{
Authorization:"Bearer "+tokenValue
}
}

)

let data = await res.json()

title = data.name

cover = data.images[0].url

preview.src = cover

tracks = data.tracks.items.map(t=>t.name)

}

/* bandcamp parser */

async function loadBandcamp(url){

let proxy = "https://api.allorigins.win/raw?url="

let res = await fetch(proxy+encodeURIComponent(url))

let html = await res.text()

let doc = new DOMParser().parseFromString(html,"text/html")

cover = doc.querySelector("meta[property='og:image']").content

title = doc.querySelector("meta[property='og:title']").content

preview.src = cover

tracks = [...doc.querySelectorAll(".track-title")].map(t=>t.innerText)

}

/* render jcard */

function render(){

let canvas = document.getElementById("canvas")

let ctx = canvas.getContext("2d")

ctx.fillStyle="#fff"

ctx.fillRect(0,0,1200,450)

let img = new Image()

img.crossOrigin="anonymous"

img.onload = ()=>{

ctx.drawImage(img,0,0,350,350)

ctx.fillStyle="#000"

ctx.font="bold 26px Arial"

ctx.fillText(title,textX,textY)

let half = Math.ceil(tracks.length/2)

let sideA = tracks.slice(0,half)

let sideB = tracks.slice(half)

ctx.font="16px Arial"

ctx.fillText("SIDE A",380,100)

sideA.forEach((t,i)=>{

ctx.fillText((i+1)+". "+t,380,130+i*18)

})

ctx.fillText("SIDE B",750,100)

sideB.forEach((t,i)=>{

ctx.fillText((i+1)+". "+t,750,130+i*18)

})

}

img.src = cover

}

/* drag title */

canvas.onmousedown=()=>drag=true
canvas.onmouseup=()=>drag=false

canvas.onmousemove=e=>{

if(drag){

textX=e.offsetX
textY=e.offsetY

render()

}

}

/* download png */

function downloadPNG(){

let link=document.createElement("a")

link.download="cassette.png"

link.href=canvas.toDataURL()

link.click()

}

/* pdf */

function downloadPDF(){

let img = canvas.toDataURL("image/png")

let w = window.open()

w.document.write("<img src='"+img+"' style='width:100%'>")

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOCOK TERUS</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-highlight: rgba(255, 255, 255, 0.15);
            --bg-dark: #0a0a0a;
            --primary: #ffffff;
            --secondary: #a0a0a0;
            --accent: #00d4ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-dark);
            color: var(--primary);
            min-height: 100vh;
        }

        .liquid-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; overflow: hidden; background: #050505;
        }
        .blob {
            position: absolute; border-radius: 50%;
            filter: blur(80px); opacity: 0.4;
            animation: float 20s infinite ease-in-out;
        }
        .blob-1 {
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 70%);
            top: -200px; left: -200px;
        }
        .blob-2 {
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(0,212,255,0.1) 0%, transparent 70%);
            bottom: -150px; right: -150px;
            animation-delay: -5s;
        }
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-30px, 30px) scale(0.9); }
        }

        .glass-nav {
            position: fixed; top: 0; left: 0; right: 0; height: 70px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 30px; z-index: 1000;
        }
        .logo { display: flex; align-items: center; gap: 12px; font-size: 1.5rem; font-weight: 700; cursor: pointer; }
        
        .nav-actions { display: flex; gap: 12px; }
        .glass-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--primary);
            padding: 10px 20px; border-radius: 12px;
            cursor: pointer; transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            font-size: 1rem; display: flex; align-items: center; gap: 8px;
        }
        .glass-btn:hover { background: var(--glass-highlight); transform: translateY(-2px); }

        .category-panel {
            position: fixed; top: 0; right: -400px;
            width: 380px; height: 100vh;
            background: rgba(10, 10, 10, 0.98);
            backdrop-filter: blur(30px);
            border-left: 1px solid var(--glass-border);
            z-index: 2000; transition: right 0.4s ease;
            padding: 30px;
        }
        .category-panel.active { right: 0; }
        
        .panel-overlay {
            position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            z-index: 1999; opacity: 0; visibility: hidden;
            transition: all 0.3s ease;
        }
        .panel-overlay.active { opacity: 1; visibility: visible; }

        .panel-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 30px; padding-bottom: 20px;
            border-bottom: 1px solid var(--glass-border);
        }
        .close-panel {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--primary);
            width: 40px; height: 40px; border-radius: 50%;
            cursor: pointer; transition: all 0.3s ease;
        }
        .close-panel:hover { transform: rotate(90deg); }

        .category-list { display: flex; flex-direction: column; gap: 16px; }
        .category-item {
            display: flex; align-items: center; gap: 16px;
            padding: 20px; background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px; cursor: pointer;
            transition: all 0.3s ease;
        }
        .category-item:hover { background: var(--glass-highlight); transform: translateX(-5px); }
        .cat-icon {
            width: 50px; height: 50px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem;
        }
        .hijab-icon { background: rgba(255, 255, 255, 0.1); }
        .bocil-icon { background: rgba(200, 200, 200, 0.15); }
        .abg-icon { background: rgba(150, 150, 150, 0.2); }

        .main-content { padding: 90px 30px 50px; max-width: 1600px; margin: 0 auto; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .section-header h2 { font-size: 1.5rem; font-weight: 600; }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }

        .video-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px; overflow: hidden;
            transition: all 0.4s ease;
            position: relative;
        }
        .video-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: var(--glass-highlight);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }
        .video-card.hidden { display: none; }
        .video-card.ready { border-color: var(--accent); }

        .video-thumbnail {
            position: relative; width: 100%; aspect-ratio: 16/9;
            overflow: hidden; cursor: pointer;
        }
        .video-thumbnail img {
            width: 100%; height: 100%; object-fit: cover;
            filter: grayscale(100%) contrast(1.1);
            transition: all 0.5s ease;
        }
        .video-card:hover .video-thumbnail img {
            transform: scale(1.1);
            filter: grayscale(0%) contrast(1.2);
        }

        .play-overlay {
            position: absolute; inset: 0;
            background: rgba(0, 0, 0, 0.4);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.3s ease;
        }
        .video-card:hover .play-overlay { opacity: 1; }
        .play-overlay i {
            font-size: 3rem; color: white;
            background: rgba(255, 255, 255, 0.2);
            width: 70px; height: 70px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .shopee-overlay {
            position: absolute; inset: 0;
            background: rgba(238, 77, 45, 0.95);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            opacity: 0; visibility: hidden;
            transition: all 0.3s ease;
        }
        .video-card.show-shopee .shopee-overlay {
            opacity: 1; visibility: visible;
        }
        .shopee-overlay i { font-size: 3rem; margin-bottom: 10px; }
        .shopee-overlay span { font-weight: 600; font-size: 1.1rem; }

        .watch-btn {
            position: absolute; bottom: 12px; left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--accent);
            color: #000; border: none;
            padding: 12px 24px; border-radius: 25px;
            font-weight: 600; cursor: pointer;
            opacity: 0; visibility: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
            display: flex; align-items: center; gap: 8px;
            box-shadow: 0 4px 20px rgba(0,212,255,0.3);
            text-decoration: none;
        }
        .video-card.ready .watch-btn {
            opacity: 1; visibility: visible;
            transform: translateX(-50%) translateY(0);
        }
        .watch-btn:hover {
            background: #fff;
            box-shadow: 0 6px 30px rgba(0,212,255,0.5);
            transform: translateX(-50%) translateY(-2px);
        }

        .category-badge {
            position: absolute; top: 12px; left: 12px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            padding: 6px 12px; border-radius: 20px;
            font-size: 0.75rem; font-weight: 600;
            text-transform: uppercase;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .video-info { padding: 20px; }
        .video-info h3 {
            font-size: 1.1rem; font-weight: 600;
            margin-bottom: 8px; line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .video-meta {
            display: flex; justify-content: space-between;
            color: var(--secondary); font-size: 0.85rem;
        }
        .ready-badge {
            color: var(--accent);
            font-size: 0.75rem;
            display: none; align-items: center; gap: 4px;
        }
        .video-card.ready .ready-badge { display: flex; }

        /* Toast */
        .toast {
            position: fixed; bottom: 30px; left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            color: var(--primary);
            padding: 16px 32px; border-radius: 12px;
            font-weight: 500; z-index: 4000;
            opacity: 0; transition: all 0.3s ease;
            display: flex; align-items: center; gap: 12px;
        }
        .toast.active { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast.success { border-color: rgba(0, 255, 136, 0.3); }
        .toast.success i { color: #00ff88; }

        @media (max-width: 768px) {
            .category-panel { width: 100%; right: -100%; }
            .video-grid { grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); }
        }
    </style>
</head>
<body>
    <div class="liquid-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <nav class="glass-nav">
        <div class="logo" onclick="location.reload()">
            <i class="fas fa-play-circle"></i>
            <span>SI-TOBRUT</span>
        </div>
        <div class="nav-actions">
            <button class="glass-btn" onclick="toggleCategoryPanel()">
                <i class="fas fa-folder-open"></i>
                <span>Kategori</span>
            </button>
        </div>
    </nav>

    <div class="category-panel" id="categoryPanel">
        <div class="panel-header">
            <h3><i class="fas fa-folders"></i> Kategori</h3>
            <button class="close-panel" onclick="toggleCategoryPanel()">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="category-list">
            <div class="category-item" onclick="filterCategory('all')">
                <div class="cat-icon" style="background: rgba(255,255,255,0.1);"><i class="fas fa-th-large"></i></div>
                <span>Semua Video</span>
            </div>
            <div class="category-item" onclick="filterCategory('hijab')">
                <div class="cat-icon hijab-icon"><i class="fas fa-user-shield"></i></div>
                <span>Hijab</span>
            </div>
            <div class="category-item" onclick="filterCategory('bocil')">
                <div class="cat-icon bocil-icon"><i class="fas fa-child"></i></div>
                <span>Bocil</span>
            </div>
            <div class="category-item" onclick="filterCategory('abg')">
                <div class="cat-icon abg-icon"><i class="fas fa-user-graduate"></i></div>
                <span>ABG</span>
            </div>
        </div>
    </div>
    <div class="panel-overlay" id="panelOverlay" onclick="toggleCategoryPanel()"></div>

    <main class="main-content">
        <div class="section-header">
            <h2 id="currentCategory">Semua Video</h2>
        </div>
        
        <div class="video-grid" id="videoGrid">

            <!-- CONTOH VIDEO -->
            <div class="video-card" 
                 data-category="Abg" 
                 data-jumpshare-id="https://jumpshare.com/embed/vCNENoHPqm1gnpE88QwH"
                 data-shopee="https://s.shopee.co.id/1gEa1RAN5w"
                 data-title="CEWEK ABG COLMEK BODY TOBRUT">

                    <img src="https://via.placeholder.com/640x360/1a1a1a/666?text=Jumpshare+Video"

                    <div class="play-overlay"><i class="fas fa-play"></i></div>
                    <div class="shopee-overlay"><i class="fas fa-shopping-bag"></i><span>Ke Shopee...</span></div>
                </div>
                <span class="category-badge">abg</span>
                <div class="video-info">
                    <h3>CEWEK ABG COLMEK BODY TOBRUT</h3>

                        <span><i class="fas fa-calendar"></i> 11 Apr 2026</span>
                        <span class="ready-badge"><i class="fas fa-check-circle"></i> Siap tonton</span>
                    </div>
                </div>
                <a href="#" class="watch-btn" onclick="watchVideo(event, this)" style="display:none;">
                    <i class="fas fa-play"></i> Tonton Video
                </a>
            </div>

            <!-- TAMBAH VIDEO BARU DI BAWAH INI -->


        </div>
    </main>

    <div class="toast" id="toast"></div>

    <script>
        const sessionReady = new Set();

        function handleThumbnailClick(thumbnail) {
            const card = thumbnail.closest('.video-card');
            const jumpshareId = card.getAttribute('data-jumpshare-id');
            const shopeeLink = card.getAttribute('data-shopee');

            if (sessionReady.has(jumpshareId)) {
                openPlayerTab(card);
            } else {
                sessionReady.add(jumpshareId);
                card.classList.add('ready');
                card.classList.add('show-shopee');
                window.open(shopeeLink, '_blank');
                
                setTimeout(() => {
                    card.classList.remove('show-shopee');
                    showToast('✓ Redirect berhasil! Klik lagi untuk nonton');
                }, 1200);
            }
        }

        function watchVideo(event, btn) {
            event.preventDefault();
            event.stopPropagation();
            const card = btn.closest('.video-card');
            openPlayerTab(card);
        }

        function openPlayerTab(card) {
            const jumpshareId = card.getAttribute('data-jumpshare-id');
            const title = card.getAttribute('data-title');
            const category = card.getAttribute('data-category');
            
            if (!jumpshareId || jumpshareId.length < 10) {
                showToast('❌ ID Video tidak valid!');
                return;
            }

            const playerUrl = `player.html?id=${encodeURIComponent(jumpshareId)}&title=${encodeURIComponent(title)}&cat=${encodeURIComponent(category)}`;
            window.open(playerUrl, '_blank');
        }

        function toggleCategoryPanel() {
            document.getElementById('categoryPanel').classList.toggle('active');
            document.getElementById('panelOverlay').classList.toggle('active');
        }

        function filterCategory(category) {
            document.querySelectorAll('.video-card').forEach(card => {
                card.classList.toggle('hidden', category !== 'all' && card.getAttribute('data-category') !== category);
            });
            document.getElementById('currentCategory').textContent = 
                category === 'all' ? 'Semua Video' : category.charAt(0).toUpperCase() + category.slice(1);
            toggleCategoryPanel();
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerHTML = `<i class="fas fa-info-circle"></i> ${message}`;
            toast.classList.add('active');
            setTimeout(() => toast.classList.remove('active'), 3000);
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.getElementById('categoryPanel').classList.remove('active');
                document.getElementById('panelOverlay').classList.remove('active');
            }
        });
    </script>
</body>

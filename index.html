<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Struk Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #000000;
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
            opacity: 0;
            animation: fadeInUp 0.8s ease forwards;
        }

        .logo {
            font-size: 0.75rem;
            letter-spacing: 0.4em;
            opacity: 0.6;
            margin-bottom: 1rem;
            text-transform: uppercase;
        }

        .title {
            font-size: 3.5rem;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.5);
            font-size: 1rem;
            font-weight: 300;
        }

        .input-section {
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 2.5rem;
            opacity: 0;
            animation: fadeInUp 0.8s ease 0.2s forwards;
            transform: translateY(20px);
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-label {
            display: block;
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 0.75rem;
            text-transform: uppercase;
            font-weight: 500;
        }

        .input-wrapper {
            position: relative;
        }

        .currency-symbol {
            position: absolute;
            left: 1.25rem;
            top: 50%;
            transform: translateY(-50%);
            color: #ffffff;
            font-weight: 600;
            font-size: 1.25rem;
            opacity: 0.8;
        }

        .nominal-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 1.25rem 1.25rem 1.25rem 3.5rem;
            color: #ffffff;
            font-size: 1.5rem;
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
            transition: all 0.3s ease;
            outline: none;
        }

        .nominal-input:focus {
            border-color: #ffffff;
            background: rgba(255, 255, 255, 0.08);
        }

        .nominal-input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        .print-btn {
            width: 100%;
            background: #ffffff;
            color: #000000;
            border: none;
            border-radius: 16px;
            padding: 1.25rem;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            text-transform: uppercase;
        }

        .print-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(255, 255, 255, 0.2);
        }

        .print-btn:active {
            transform: translateY(0);
        }

        .printer-section {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 8vh;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.5s ease;
            overflow-y: auto;
        }

        .printer-section.active {
            display: flex;
            opacity: 1;
        }

        .printer-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 400px;
            perspective: 1000px;
        }

        .printer-body {
            width: 340px;
            height: 120px;
            background: linear-gradient(180deg, #3a3a3a 0%, #1a1a1a 50%, #0d0d0d 100%);
            border-radius: 16px 16px 10px 10px;
            position: relative;
            box-shadow: 
                0 30px 80px rgba(0, 0, 0, 0.9),
                inset 0 2px 0 rgba(255, 255, 255, 0.15),
                inset 0 -2px 0 rgba(0, 0, 0, 0.5);
            z-index: 20;
            flex-shrink: 0;
            transform: translateZ(20px);
        }

        .printer-body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 35%;
            background: linear-gradient(180deg, #4a4a4a 0%, #2a2a2a 100%);
            border-radius: 16px 16px 0 0;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .printer-face {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 65%;
            background: linear-gradient(180deg, #2a2a2a 0%, #111 100%);
            border-radius: 0 0 10px 10px;
            box-shadow: inset 0 -3px 10px rgba(0, 0, 0, 0.5);
        }

        .printer-slot-area {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 260px;
            height: 20px;
            background: #0a0a0a;
            border-radius: 10px;
            box-shadow: 
                inset 0 3px 8px rgba(0, 0, 0, 1),
                0 1px 0 rgba(255, 255, 255, 0.1),
                inset 0 -1px 0 rgba(255, 255, 255, 0.05);
            overflow: hidden;
        }

        .printer-slot {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform: translate(-50%, 50%);
            width: 240px;
            height: 4px;
            background: #000;
            border-radius: 2px;
            box-shadow: 
                0 1px 2px rgba(0, 0, 0, 0.8),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .roller {
            position: absolute;
            bottom: 2px;
            width: 12px;
            height: 12px;
            background: #333;
            border-radius: 50%;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.8);
            animation: none;
        }

        .roller.left { left: 20px; }
        .roller.right { right: 20px; }

        .roller.active {
            animation: roll 0.1s linear infinite;
        }

        @keyframes roll {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .printer-light {
            position: absolute;
            top: 25px;
            right: 25px;
            width: 12px;
            height: 12px;
            background: #333;
            border-radius: 50%;
            box-shadow: 
                inset 0 2px 4px rgba(0, 0, 0, 0.5),
                0 0 0 2px #1a1a1a;
            transition: all 0.3s ease;
        }

        .printer-light.active {
            background: #00ff41;
            box-shadow: 
                0 0 20px rgba(0, 255, 65, 0.8), 
                0 0 40px rgba(0, 255, 65, 0.4),
                inset 0 2px 4px rgba(0, 0, 0, 0.2);
            animation: blink 0.4s ease infinite alternate;
        }

        @keyframes blink {
            from { opacity: 1; }
            to { opacity: 0.3; }
        }

        .printer-brand {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 0.7rem;
            letter-spacing: 0.4em;
            color: rgba(255, 255, 255, 0.4);
            font-weight: 600;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
        }

        .receipt-outer {
            position: relative;
            width: 280px;
            z-index: 15;
            margin-top: -2px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* PERBAIKAN: Container dengan overflow hidden */
        .receipt-container {
            width: 100%;
            height: 0;
            overflow: hidden;
            position: relative;
            background: transparent;
            filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.3));
            transition: height 0.05s linear;
        }

        .receipt-container::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 5%;
            right: 5%;
            height: 20px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.2), transparent);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .receipt-container.has-content::after {
            opacity: 1;
        }

        .receipt-paper {
            width: 100%;
            background: #ffffff;
            transform: translateY(-100%);
            box-shadow: 
                0 4px 6px rgba(0, 0, 0, 0.1),
                0 10px 40px rgba(0, 0, 0, 0.2);
            background-image: 
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 20px,
                    rgba(0, 0, 0, 0.01) 20px,
                    rgba(0, 0, 0, 0.01) 21px
                );
            position: relative;
        }

        .receipt-paper::before {
            content: '';
            position: absolute;
            top: -5px;
            left: 0;
            right: 0;
            height: 10px;
            background: 
                repeating-linear-gradient(
                    90deg,
                    #fff 0px,
                    #fff 5px,
                    #f0f0f0 5px,
                    #f0f0f0 10px
                );
            clip-path: polygon(
                0% 100%, 
                2% 0%, 4% 100%, 6% 0%, 8% 100%, 
                10% 0%, 12% 100%, 14% 0%, 16% 100%,
                18% 0%, 20% 100%, 22% 0%, 24% 100%,
                26% 0%, 28% 100%, 30% 0%, 32% 100%,
                34% 0%, 36% 100%, 38% 0%, 40% 100%,
                42% 0%, 44% 100%, 46% 0%, 48% 100%,
                50% 0%, 52% 100%, 54% 0%, 56% 100%,
                58% 0%, 60% 100%, 62% 0%, 64% 100%,
                66% 0%, 68% 100%, 70% 0%, 72% 100%,
                74% 0%, 76% 100%, 78% 0%, 80% 100%,
                82% 0%, 84% 100%, 86% 0%, 88% 100%,
                90% 0%, 92% 100%, 94% 0%, 96% 100%,
                98% 0%, 100% 100%
            );
        }

        .receipt-paper::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 0;
            right: 0;
            height: 8px;
            background: 
                repeating-linear-gradient(
                    90deg,
                    #fff 0px,
                    #fff 4px,
                    transparent 4px,
                    transparent 8px
                );
            clip-path: polygon(
                0% 0%, 3% 100%, 6% 0%, 9% 100%, 12% 0%,
                15% 100%, 18% 0%, 21% 100%, 24% 0%,
                27% 100%, 30% 0%, 33% 100%, 36% 0%,
                39% 100%, 42% 0%, 45% 100%, 48% 0%,
                51% 100%, 54% 0%, 57% 100%, 60% 0%,
                63% 100%, 66% 0%, 69% 100%, 72% 0%,
                75% 100%, 78% 0%, 81% 100%, 84% 0%,
                87% 100%, 90% 0%, 93% 100%, 96% 0%,
                99% 100%, 100% 0%
            );
        }

        .receipt-content {
            padding: 2rem 1.5rem;
            color: #000000;
            font-family: 'JetBrains Mono', monospace;
        }

        .receipt-header {
            text-align: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px dashed #ccc;
        }

        .receipt-title {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
            letter-spacing: 0.1em;
        }

        .receipt-date {
            font-size: 0.7rem;
            color: #666;
        }

        .receipt-amount-section {
            text-align: center;
            margin: 2rem 0;
            padding: 1.5rem 0;
            border-top: 1px solid #eee;
            border-bottom: 1px solid #eee;
        }

        .amount-label {
            font-size: 0.65rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
        }

        .amount-value {
            font-size: 1.75rem;
            font-weight: 700;
            color: #000000;
            letter-spacing: -0.02em;
        }

        .qr-section {
            margin-top: 1.5rem;
            text-align: center;
        }

        .qr-label {
            font-size: 0.65rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 1rem;
        }

        .qr-container {
            width: 140px;
            height: 140px;
            margin: 0 auto;
            background: #ffffff;
            padding: 8px;
            border: 1px solid #eee;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #qrcode img {
            width: 100% !important;
            height: 100% !important;
            display: block;
        }

        .qr-hint {
            margin-top: 1rem;
            font-size: 0.6rem;
            color: #888;
            line-height: 1.5;
        }

        .receipt-footer {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.6rem;
            color: #999;
            padding-top: 1rem;
            border-top: 2px dashed #ccc;
        }

        .close-btn {
            position: fixed;
            top: 2rem;
            right: 2rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ffffff;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 102;
            opacity: 0;
            pointer-events: none;
            backdrop-filter: blur(10px);
        }

        .close-btn.show {
            opacity: 1;
            pointer-events: all;
        }

        .close-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: rotate(90deg);
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .sound-waves {
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            gap: 4px;
            align-items: flex-end;
        }

        .sound-waves.active {
            display: flex;
        }

        .wave {
            width: 3px;
            background: linear-gradient(to top, #00ff41, #ffffff);
            border-radius: 2px;
            animation: wave 0.4s ease infinite alternate;
            opacity: 0.6;
        }

        .wave:nth-child(1) { height: 8px; animation-delay: 0s; }
        .wave:nth-child(2) { height: 15px; animation-delay: 0.05s; }
        .wave:nth-child(3) { height: 22px; animation-delay: 0.1s; }
        .wave:nth-child(4) { height: 15px; animation-delay: 0.15s; }
        .wave:nth-child(5) { height: 8px; animation-delay: 0.2s; }

        @keyframes wave {
            from { 
                transform: scaleY(0.3); 
                opacity: 0.3; 
            }
            to { 
                transform: scaleY(1); 
                opacity: 1; 
            }
        }

        .printing .printer-body {
            animation: vibrate 0.05s linear infinite;
        }

        @keyframes vibrate {
            0%, 100% { transform: translateX(0) translateZ(20px); }
            25% { transform: translateX(-0.5px) translateZ(20px); }
            75% { transform: translateX(0.5px) translateZ(20px); }
        }

        @media (max-width: 480px) {
            .title { font-size: 2.5rem; }
            .input-section { padding: 1.5rem; }
            .printer-body { width: 300px; height: 110px; }
            .receipt-outer { width: 260px; }
            .printer-slot-area { width: 240px; }
            .printer-slot { width: 220px; }
            .printer-section { padding-top: 5vh; }
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>

    <div class="container">
        <div class="header">
            <div class="logo">PAYMENT SYSTEM</div>
            <h1 class="title">Struk Digital</h1>
            <p class="subtitle">Cetak struk pembayaran dengan QRIS</p>
        </div>

        <div class="input-section">
            <div class="input-group">
                <label class="input-label">Nominal Pembayaran</label>
                <div class="input-wrapper">
                    <span class="currency-symbol">Rp</span>
                    <input type="text" class="nominal-input" id="nominalInput" placeholder="0" autocomplete="off">
                </div>
            </div>
            <button class="print-btn" id="printBtn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="6 9 6 2 18 2 18 9"></polyline>
                    <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path>
                    <rect x="6" y="14" width="12" height="8"></rect>
                </svg>
                CETAK STRUK
            </button>
        </div>
    </div>

    <div class="printer-section" id="printerSection">
        <button class="close-btn" id="closeBtn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        </button>

        <div class="printer-wrapper" id="printerWrapper">
            <div class="printer-body">
                <div class="printer-face"></div>
                <div class="printer-slot-area">
                    <div class="printer-slot"></div>
                    <div class="roller left" id="rollerLeft"></div>
                    <div class="roller right" id="rollerRight"></div>
                </div>
                <div class="printer-light" id="printerLight"></div>
                <div class="printer-brand">THERMAL</div>
                <div class="sound-waves" id="soundWaves">
                    <div class="wave"></div>
                    <div class="wave"></div>
                    <div class="wave"></div>
                    <div class="wave"></div>
                    <div class="wave"></div>
                </div>
            </div>

            <div class="receipt-outer">
                <div class="receipt-container" id="receiptContainer">
                    <div class="receipt-paper" id="receiptPaper">
                        <div class="receipt-content" id="receiptContent">
                            <div class="receipt-header">
                                <div class="receipt-title">STRUK DIGITAL</div>
                                <div class="receipt-date" id="receiptDate"></div>
                            </div>
                            
                            <div class="receipt-amount-section">
                                <div class="amount-label">Total Pembayaran</div>
                                <div class="amount-value" id="receiptAmount">Rp 0</div>
                            </div>

                            <div class="qr-section">
                                <div class="qr-label">Scan untuk Bayar</div>
                                <div class="qr-container">
                                    <div id="qrcode"></div>
                                </div>
                                <div class="qr-hint">
                                    Screenshot struk ini<br>
                                    dan scan QRIS untuk pembayaran
                                </div>
                            </div>

                            <div class="receipt-footer">
                                Terima kasih atas pembayaran Anda<br>
                                ***
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const nominalInput = document.getElementById('nominalInput');
        const printBtn = document.getElementById('printBtn');
        const printerSection = document.getElementById('printerSection');
        const printerWrapper = document.getElementById('printerWrapper');
        const receiptContainer = document.getElementById('receiptContainer');
        const receiptPaper = document.getElementById('receiptPaper');
        const printerLight = document.getElementById('printerLight');
        const soundWaves = document.getElementById('soundWaves');
        const rollerLeft = document.getElementById('rollerLeft');
        const rollerRight = document.getElementById('rollerRight');
        const receiptDate = document.getElementById('receiptDate');
        const receiptAmount = document.getElementById('receiptAmount');
        const closeBtn = document.getElementById('closeBtn');
        const qrContainer = document.getElementById('qrcode');

        let qrCodeObj = null;

        function formatCurrency(value) {
            return new Intl.NumberFormat('id-ID').format(value);
        }

        nominalInput.addEventListener('input', (e) => {
            let value = e.target.value.replace(/\D/g, '');
            if (value) {
                e.target.value = formatCurrency(value);
            } else {
                e.target.value = '';
            }
        });

        function generateQRCode(text) {
            qrContainer.innerHTML = '';
            qrCodeObj = new QRCode(qrContainer, {
                text: text,
                width: 124,
                height: 124,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });
        }

        printBtn.addEventListener('click', () => {
            const value = nominalInput.value.replace(/\D/g, '');
            if (!value || value === '0') {
                nominalInput.style.borderColor = 'rgba(255, 255, 255, 0.5)';
                setTimeout(() => {
                    nominalInput.style.borderColor = '';
                }, 300);
                return;
            }

            const now = new Date();
            receiptDate.textContent = now.toLocaleString('id-ID', {
                day: '2-digit',
                month: 'long',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
            receiptAmount.textContent = 'Rp ' + nominalInput.value;

            // Generate QR dulu
            const qrData = `https://payment.example.com/pay?amount=${value}&ref=${Date.now()}`;
            generateQRCode(qrData);

            // Tampilkan section
            printerSection.classList.add('active');
            
            // Reset posisi - kertas di atas (tersembunyi)
            receiptContainer.style.height = '0';
            receiptContainer.classList.remove('has-content');
            receiptPaper.style.transform = 'translateY(-100%)';
            
            // Tunggu QR render lalu mulai animasi
            setTimeout(() => {
                startPrinting();
            }, 200);
        });

        function startPrinting() {
            printerLight.classList.add('active');
            soundWaves.classList.add('active');
            rollerLeft.classList.add('active');
            rollerRight.classList.add('active');
            printerWrapper.classList.add('printing');

            // Ambil tinggi full kertas
            const fullHeight = receiptPaper.scrollHeight;
            
            // Durasi animasi
            const duration = 2000;
            const interval = 16;
            const steps = duration / interval;
            
            let stepCount = 0;

            const printInterval = setInterval(() => {
                stepCount++;
                
                const progress = stepCount / steps;
                // Easing cubic ease-out untuk gerakan natural
                const easedProgress = 1 - Math.pow(1 - progress, 3);
                
                // PERBAIKAN: Container height bertambah dari 0 ke fullHeight
                // Ini membuat kertas terlihat "keluar" dari printer
                const currentHeight = fullHeight * easedProgress;
                
                // Kertas bergerak dari atas (-100%) ke posisi normal (0)
                const currentTranslate = -100 + (100 * easedProgress);

                receiptContainer.style.height = currentHeight + 'px';
                receiptPaper.style.transform = `translateY(${currentTranslate}%)`;

                if (stepCount >= steps) {
                    clearInterval(printInterval);
                    
                    // Pastikan posisi akhir tepat
                    receiptContainer.style.height = fullHeight + 'px';
                    receiptPaper.style.transform = 'translateY(0)';
                    receiptContainer.classList.add('has-content');
                    
                    setTimeout(() => {
                        printerLight.classList.remove('active');
                        soundWaves.classList.remove('active');
                        rollerLeft.classList.remove('active');
                        rollerRight.classList.remove('active');
                        printerWrapper.classList.remove('printing');
                        closeBtn.classList.add('show');
                    }, 400);
                }
            }, interval);
        }

        closeBtn.addEventListener('click', resetPrinter);

        function resetPrinter() {
            printerSection.classList.remove('active');
            closeBtn.classList.remove('show');
            
            // Reset ke posisi awal
            receiptContainer.style.height = '0';
            receiptContainer.classList.remove('has-content');
            receiptPaper.style.transform = 'translateY(-100%)';
            
            printerLight.classList.remove('active');
            soundWaves.classList.remove('active');
            rollerLeft.classList.remove('active');
            rollerRight.classList.remove('active');
            printerWrapper.classList.remove('printing');
            
            qrContainer.innerHTML = '';
            nominalInput.value = '';
        }

        nominalInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                printBtn.click();
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamFlow - Video Streaming</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-highlight: rgba(255, 255, 255, 0.15);
            --bg-dark: #0a0a0a;
            --primary: #ffffff;
            --secondary: #a0a0a0;
            --accent: #00d4ff;
            --shopee: #ee4d2d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-dark);
            color: var(--primary);
            min-height: 100vh;
        }

        .liquid-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; overflow: hidden; background: #050505;
        }
        .blob {
            position: absolute; border-radius: 50%;
            filter: blur(80px); opacity: 0.4;
            animation: float 20s infinite ease-in-out;
        }
        .blob-1 {
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 70%);
            top: -200px; left: -200px;
        }
        .blob-2 {
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(0,212,255,0.1) 0%, transparent 70%);
            bottom: -150px; right: -150px;
            animation-delay: -5s;
        }
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-30px, 30px) scale(0.9); }
        }

        .glass-nav {
            position: fixed; top: 0; left: 0; right: 0; height: 70px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 30px; z-index: 1000;
        }
        .logo { display: flex; align-items: center; gap: 12px; font-size: 1.5rem; font-weight: 700; cursor: pointer; }
        
        .nav-actions { display: flex; gap: 12px; }
        .glass-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--primary);
            padding: 10px 20px; border-radius: 12px;
            cursor: pointer; transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            font-size: 1rem; display: flex; align-items: center; gap: 8px;
        }
        .glass-btn:hover { background: var(--glass-highlight); transform: translateY(-2px); }

        .category-panel {
            position: fixed; top: 0; right: -400px;
            width: 380px; height: 100vh;
            background: rgba(10, 10, 10, 0.98);
            backdrop-filter: blur(30px);
            border-left: 1px solid var(--glass-border);
            z-index: 2000; transition: right 0.4s ease;
            padding: 30px;
        }
        .category-panel.active { right: 0; }
        
        .panel-overlay {
            position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            z-index: 1999; opacity: 0; visibility: hidden;
            transition: all 0.3s ease;
        }
        .panel-overlay.active { opacity: 1; visibility: visible; }

        .panel-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 30px; padding-bottom: 20px;
            border-bottom: 1px solid var(--glass-border);
        }
        .close-panel {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--primary);
            width: 40px; height: 40px; border-radius: 50%;
            cursor: pointer; transition: all 0.3s ease;
        }
        .close-panel:hover { transform: rotate(90deg); }

        .category-list { display: flex; flex-direction: column; gap: 16px; }
        .category-item {
            display: flex; align-items: center; gap: 16px;
            padding: 20px; background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px; cursor: pointer;
            transition: all 0.3s ease;
        }
        .category-item:hover { background: var(--glass-highlight); transform: translateX(-5px); }
        .cat-icon {
            width: 50px; height: 50px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem;
        }
        .hijab-icon { background: rgba(255, 255, 255, 0.1); }
        .bocil-icon { background: rgba(200, 200, 200, 0.15); }
        .abg-icon { background: rgba(150, 150, 150, 0.2); }

        .main-content { padding: 90px 30px 50px; max-width: 1600px; margin: 0 auto; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .section-header h2 { font-size: 1.5rem; font-weight: 600; }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }

        .video-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px; overflow: hidden;
            transition: all 0.4s ease;
            position: relative;
        }
        .video-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: var(--glass-highlight);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }
        .video-card.hidden { display: none; }
        .video-card.ready { border-color: var(--accent); }

        .video-thumbnail {
            position: relative; width: 100%; aspect-ratio: 16/9;
            overflow: hidden; cursor: pointer;
        }
        .video-thumbnail img {
            width: 100%; height: 100%; object-fit: cover;
            filter: grayscale(100%) contrast(1.1);
            transition: all 0.5s ease;
        }
        .video-card:hover .video-thumbnail img {
            transform: scale(1.1);
            filter: grayscale(0%) contrast(1.2);
        }

        .play-overlay {
            position: absolute; inset: 0;
            background: rgba(0, 0, 0, 0.4);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.3s ease;
        }
        .video-card:hover .play-overlay { opacity: 1; }
        .play-overlay i {
            font-size: 3rem; color: white;
            background: rgba(255, 255, 255, 0.2);
            width: 70px; height: 70px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .shopee-overlay {
            position: absolute; inset: 0;
            background: rgba(238, 77, 45, 0.95);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            opacity: 0; visibility: hidden;
            transition: all 0.3s ease;
        }
        .video-card.show-shopee .shopee-overlay {
            opacity: 1; visibility: visible;
        }
        .shopee-overlay i { font-size: 3rem; margin-bottom: 10px; }
        .shopee-overlay span { font-weight: 600; font-size: 1.1rem; }

        .watch-btn {
            position: absolute; bottom: 12px; left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--accent);
            color: #000; border: none;
            padding: 12px 24px; border-radius: 25px;
            font-weight: 600; cursor: pointer;
            opacity: 0; visibility: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
            display: flex; align-items: center; gap: 8px;
            box-shadow: 0 4px 20px rgba(0,212,255,0.3);
        }
        .video-card.ready .watch-btn {
            opacity: 1; visibility: visible;
            transform: translateX(-50%) translateY(0);
        }
        .watch-btn:hover {
            background: #fff;
            box-shadow: 0 6px 30px rgba(0,212,255,0.5);
            transform: translateX(-50%) translateY(-2px);
        }

        .category-badge {
            position: absolute; top: 12px; left: 12px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            padding: 6px 12px; border-radius: 20px;
            font-size: 0.75rem; font-weight: 600;
            text-transform: uppercase;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .video-info { padding: 20px; }
        .video-info h3 {
            font-size: 1.1rem; font-weight: 600;
            margin-bottom: 8px; line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .video-meta {
            display: flex; justify-content: space-between;
            color: var(--secondary); font-size: 0.85rem;
        }
        .ready-badge {
            color: var(--accent);
            font-size: 0.75rem;
            display: none; align-items: center; gap: 4px;
        }
        .video-card.ready .ready-badge { display: flex; }

        /* Player Modal */
        .player-modal {
            position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            z-index: 3000; display: none;
            align-items: center; justify-content: center;
            padding: 40px;
        }
        .player-modal.active { display: flex; }
        .player-container {
            width: 100%; max-width: 1000px;
            position: relative;
        }
        .player-close {
            position: absolute; top: -50px; right: 0;
            width: 40px; height: 40px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 50%; color: var(--primary);
            cursor: pointer; font-size: 1.2rem;
            transition: all 0.3s ease;
        }
        .player-close:hover { transform: rotate(90deg); background: rgba(255,50,50,0.3); }
        
        .video-wrapper {
            position: relative; padding-bottom: 56.25%;
            border-radius: 20px; overflow: hidden;
            background: #000;
        }
        .video-wrapper iframe {
            position: absolute; inset: 0;
            width: 100%; height: 100%; border: none;
        }
        .video-error {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            color: var(--secondary);
            text-align: center; padding: 40; overflow: hidden;
            transition: all 0.4s ease;

        }

<body>

                <span>Semua Video</span>
            </div>
            <div class="category-item" onclick="filterCategory('hijab')">

            </div>
            <div class="category-item" onclick="filterCategory('bocil')">

    <div class="player-modal" id="playerModal">
        <div class="player-container">
            <button class="player-close" onclick="closePlayer()"><i class="fas fa-times"></i></button>
            <div class="video-wrapper" id="playerWrapper"></div>

    <div class="toast" id="toast"></div>

    <script>
        // Cek status saat load
        document.addEventListener('DOMContentLoaded', () => {
            const ready = JSON.parse(localStorage.getItem('readyVideos') || '[]');
            document.querySelectorAll('.video-card').forEach(card => {
                const driveId = card.getAttribute('data-drive-id');
                if (ready.includes(driveId)) {
                    card.classList.add('ready');
                }
            });
        });

        function handleThumbnailClick(thumbnail) {
            const card = thumbnail.closest('.video-card');
            const driveId = card.getAttribute('data-drive-id');
            const shopeeLink = card.getAttribute('data-shopee');
            const ready = JSON.parse(localStorage.getItem('readyVideos') || '[]');

            if (ready.includes(driveId)) {
                openPlayer(driveId);
            } else {
                // Tandai ready dan buka Shopee
                localStorage.setItem('readyVideos', JSON.stringify([...ready, driveId]));
                card.classList.add('ready');
                
                card.classList.add('show-shopee');
                window.open(shopeeLink, '_blank');
                
                setTimeout(() => {
                    card.classList.remove('show-shopee');
                    showToast('✓ Redirect berhasil! Klik "Tonton Video"', 'success');
                }, 1200);
            }
        }

        function watchVideo(event, btn) {
            event.stopPropagation();
            const card = btn.closest('.video-card');
            const driveId = card.getAttribute('data-drive-id');
            openPlayer(driveId);
        }

        function openPlayer(driveId) {
            if (!driveId || driveId.length < 25) {
                showToast('❌ ID Video tidak valid!', 'error');
                return;
            }

            const modal = document.getElementById('playerModal');
            const wrapper = document.getElementById('playerWrapper');
            
            wrapper.innerHTML = `
                <iframe src="https://drive.google.com/file/d/${driveId}/preview?usp=sharing" 
                        allowfullscreen allow="autoplay; encrypted-media"></iframe>
            `;
            
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closePlayer() {
            document.getElementById('playerModal').classList.remove('active');
            document.getElementById('playerWrapper').innerHTML = '';
            document.body.style.overflow = '';
        }

        function toggleCategoryPanel() {
            document.getElementById('categoryPanel').classList.toggle('active');
            document.getElementById('panelOverlay').classList.toggle('active');
        }

        function filterCategory(category) {
            document.querySelectorAll('.video-card').forEach(card => {
                card.classList.toggle('hidden', category !== 'all' && card.getAttribute('data-category') !== category);
            });
            document.getElementById('currentCategory').textContent = 
                category === 'all' ? 'Semua Video' : category.charAt(0).toUpperCase() + category.slice(1);
            toggleCategoryPanel();
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i> ${message}`;
            toast.classList.add('active');
            setTimeout(() => toast.classList.remove('active'), 3000);
        }

        document.getElementById('playerModal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) closePlayer();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closePlayer();
                document.getElementById('categoryPanel').classList.remove('active');
                document.getElementById('panelOverlay').classList.remove('active');
            }
        });
    </script>
</body>
</html>

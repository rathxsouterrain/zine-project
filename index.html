<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SI-TOBRUT</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-highlight: rgba(255, 255, 255, 0.15);
            --bg-dark: #0a0a0a;
            --primary: #ffffff;
            --secondary: #a0a0a0;
            --accent: #00d4ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-dark);
            color: var(--primary);
            min-height: 100vh;
        }

        .liquid-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; overflow: hidden; background: #050505;
        }
        .blob {
            position: absolute; border-radius: 50%;
            filter: blur(80px); opacity: 0.4;
            animation: float 20s infinite ease-in-out;
        }
        .blob-1 {
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 70%);
            top: -200px; left: -200px;
        }
        .blob-2 {
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(0,212,255,0.1) 0%, transparent 70%);
            bottom: -150px; right: -150px;
            animation-delay: -5s;
        }
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-30px, 30px) scale(0.9); }
        }

        .glass-nav {
            position: fixed; top: 0; left: 0; right: 0; height: 70px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 30px; z-index: 1000;
        }
        .logo { display: flex; align-items: center; gap: 12px; font-size: 1.5rem; font-weight: 700; cursor: pointer; }
        
        .nav-actions { display: flex; gap: 12px; }
        .glass-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--primary);
            padding: 10px 20px; border-radius: 12px;
            cursor: pointer; transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            font-size: 1rem; display: flex; align-items: center; gap: 8px;
        }
        .glass-btn:hover { background: var(--glass-highlight); transform: translateY(-2px); }

        .category-panel {
            position: fixed; top: 0; right: -400px;
            width: 380px; height: 100vh;
            background: rgba(10, 10, 10, 0.98);
            backdrop-filter: blur(30px);
            border-left: 1px solid var(--glass-border);
            z-index: 2000; transition: right 0.4s ease;
            padding: 30px;
        }
        .category-panel.active { right: 0; }
        
        .panel-overlay {
            position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            z-index: 1999; opacity: 0; visibility: hidden;
            transition: all 0.3s ease;
        }
        .panel-overlay.active { opacity: 1; visibility: visible; }

        .panel-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 30px; padding-bottom: 20px;
            border-bottom: 1px solid var(--glass-border);
        }
        .close-panel {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--primary);
            width: 40px; height: 40px; border-radius: 50%;
            cursor: pointer; transition: all 0.3s ease;
        }
        .close-panel:hover { transform: rotate(90deg); }

        .category-list { display: flex; flex-direction: column; gap: 16px; }
        .category-item {
            display: flex; align-items: center; gap: 16px;
            padding: 20px; background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px; cursor: pointer;
            transition: all 0.3s ease;
        }
        .category-item:hover { background: var(--glass-highlight); transform: translateX(-5px); }
        .cat-icon {
            width: 50px; height: 50px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem;
        }
        .hijab-icon { background: rgba(255, 255, 255, 0.1); }
        .bocil-icon { background: rgba(200, 200, 200, 0.15); }
        .abg-icon { background: rgba(150, 150, 150, 0.2); }

        .main-content { padding: 90px 20px 50px; max-width: 1400px; margin: 0 auto; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .section-header h2 { font-size: 1.3rem; font-weight: 600; }

        /* SMALL LAYOUT - Film Stream Style */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 16px;
        }

        .video-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 12px; 
            overflow: hidden;
            transition: all 0.3s ease;
            position: relative;
            cursor: pointer;
        }
        .video-card:hover {
            transform: translateY(-5px) scale(1.05);
            border-color: var(--glass-highlight);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }
        .video-card.hidden { display: none; }
        .video-card.ready { border-color: var(--accent); box-shadow: 0 0 20px rgba(0,212,255,0.3); }

        .video-thumbnail {
            position: relative; 
            width: 100%; 
            aspect-ratio: 2/3;
            overflow: hidden;
        }
        .video-thumbnail img {
            width: 100%; height: 100%; object-fit: cover;
            filter: contrast(1.1) brightness(0.95);
            transition: all 0.4s ease;
        }
        .video-card:hover .video-thumbnail img {
            transform: scale(1.1);
            filter: contrast(1.2) brightness(1);
        }

        .play-overlay {
            position: absolute; inset: 0;
            background: rgba(0, 0, 0, 0.3);
            display: flex; align-items: center; justify-content: center;
            opacity: 1; transition: all 0.3s ease;
        }
        .video-card:hover .play-overlay { 
            background: rgba(0, 0, 0, 0.5);
            opacity: 1; 
        }
        .video-card:hover .play-overlay i {
            transform: scale(1.1);
            background: rgba(255, 255, 255, 0.3);
        }
        .play-overlay i {
            font-size: 2rem; color: white;
            background: rgba(255, 255, 255, 0.2);
            width: 50px; height: 50px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
        }

        .shopee-overlay {
            position: absolute; inset: 0;
            background: rgba(238, 77, 45, 0.95);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            opacity: 0; visibility: hidden;
            transition: all 0.3s ease;
        }
        .video-card.show-shopee .shopee-overlay {
            opacity: 1; visibility: visible;
        }
        .shopee-overlay i { font-size: 2rem; margin-bottom: 8px; }
        .shopee-overlay span { font-weight: 600; font-size: 0.9rem; }

        .ready-indicator {
            position: absolute; top: 8px; right: 8px;
            width: 12px; height: 12px;
            background: #00ff88;
            border-radius: 50%;
            box-shadow: 0 0 10px #00ff88;
            display: none;
            animation: pulse 1.5s infinite;
        }
        .video-card.ready .ready-indicator { display: block; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .category-badge {
            position: absolute; top: 8px; left: 8px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 4px 8px; border-radius: 12px;
            font-size: 0.65rem; font-weight: 600;
            text-transform: uppercase;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .video-info { 
            padding: 12px; 
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            position: absolute; bottom: 0; left: 0; right: 0;
        }
        .video-info h3 {
            font-size: 0.85rem; font-weight: 600;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 4px;
        }
        .video-meta {
            display: flex; justify-content: space-between;
            color: var(--secondary); font-size: 0.7rem;
        }

        /* Toast */
        .toast {
            position: fixed; bottom: 30px; left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            color: var(--primary);
            padding: 16px 32px; border-radius: 12px;
            font-weight: 500; z-index: 4000;
            opacity: 0; transition: all 0.3s ease;
            display: flex; align-items: center; gap: 12px;
        }
        .toast.active { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast.success { border-color: rgba(0, 255, 136, 0.3); }
        .toast.success i { color: #00ff88; }

        @media (max-width: 768px) {
            .category-panel { width: 100%; right: -100%; }
            .video-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
            .main-content { padding: 90px 12px 50px; }
        }
    </style>
</head>

    <div class="toast" id="toast"></div>

    <script>
        const sessionReady = new Set();

        // Event delegation untuk semua video card
        document.getElementById('videoGrid').addEventListener('click', function(e) {
            const card = e.target.closest('.video-card');
            if (!card) return;
            
            const videoUrl = card.getAttribute('data-video-url');
            const shopeeLink = card.getAttribute('data-shopee');
            
            if (!videoUrl || !shopeeLink) return;

            // Cek apakah sudah ready (klik kedua)
            if (sessionReady.has(videoUrl)) {
                // KLIK KEDUA: Langsung ke video URL (Google Drive)
                window.open(videoUrl, '_blank');
            } else {
                // KLIK PERTAMA: Ke Shopee + Mark as Ready
                sessionReady.add(videoUrl);
                card.classList.add('ready');
                card.classList.add('show-shopee');
                card.querySelector('.ready-text').style.display = 'inline';
                
                // Buka Shopee
                window.open(shopeeLink, '_blank');
                
                // Hilangkan overlay Shopee setelah 1.5 detik
                setTimeout(() => {
                    card.classList.remove('show-shopee');
                    showToast('✓ Klik lagi untuk nonton video');
                }, 1500);
            }
        });

        function toggleCategoryPanel() {
            document.getElementById('categoryPanel').classList.toggle('active');
            document.getElementById('panelOverlay').classList.toggle('active');
        }

        function filterCategory(category) {
            document.querySelectorAll('.video-card').forEach(card => {
                card.classList.toggle('hidden', category !== 'all' && card.getAttribute('data-category') !== category);
            });
            document.getElementById('currentCategory').textContent = 
                category === 'all' ? 'Semua Video' : category.charAt(0).toUpperCase() + category.slice(1);
            toggleCategoryPanel();
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerHTML = `<i class="fas fa-info-circle"></i> ${message}`;
            toast.classList.add('active');
            setTimeout(() => toast.classList.remove('active'), 3000);
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.getElementById('categoryPanel').classList.remove('active');
                document.getElementById('panelOverlay').classList.remove('active');
            }
        });
    </script>

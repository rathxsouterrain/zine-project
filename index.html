<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Frog Bike Animation</title>

<style>

body{
background:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

#bike{
animation:ride 6s linear infinite;
}

#wheel1,#wheel2{
transform-origin:center;
animation:spin 1s linear infinite;
}

#frog{
animation:bounce 0.35s ease-in-out infinite;
}

@keyframes ride{
0%{transform:translateX(-400px);}
100%{transform:translateX(120vw);}
}

@keyframes spin{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

@keyframes bounce{
0%{transform:translateY(0);}
50%{transform:translateY(-5px);}
100%{transform:translateY(0);}
}

</style>
</head>

<body>

<svg width="500" viewBox="0 0 800 400">

<g id="bike">

<g id="frog">
<!-- SVG KATAK -->
</g>

<g id="wheel1">
<!-- RODA DEPAN -->
</g>

<g id="wheel2">
<!-- RODA BELAKANG -->
</g>

</g>

</svg>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Video</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            color: #fff;
            min-height: 100vh;
        }

        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.37);
        }

        .header {
            position: fixed;
            top: 0; left: 0; right: 0;
            padding: 20px 30px;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .menu-btn {
            width: 50px; height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .menu-btn:hover { transform: scale(1.1); background: rgba(255,255,255,0.1); }

        .drawer-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            opacity: 0; visibility: hidden;
            transition: all 0.4s;
            z-index: 200;
        }

        .drawer-overlay.active { opacity: 1; visibility: visible; }

        .drawer {
            position: fixed;
            top: 0; right: -50%;
            width: 50%; height: 100%;
            z-index: 201;
            transition: right 0.4s;
            padding: 100px 40px 40px;
        }

        .drawer.active { right: 0; }

        @media (max-width: 768px) {
            .drawer { width: 85%; right: -85%; }
        }

        .folder-card {
            padding: 30px;
            border-radius: 24px;
            margin-bottom: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .folder-card:hover {
            transform: translateX(-10px);
            background: rgba(255,255,255,0.1);
        }

        .main-content {
            padding: 100px 30px 50px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .section-title {
            font-size: 48px;
            font-weight: 200;
            margin-bottom: 10px;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 30px;
        }

        .video-card {
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s;
        }

        .video-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .video-thumb {
            width: 100%;
            aspect-ratio: 16/9;
            background: #2a2a2a;
            position: relative;
            overflow: hidden;
        }

        .video-thumb img {
            width: 100%; height: 100%;
            object-fit: cover;
            transition: transform 0.4s;
        }

        .video-card:hover .video-thumb img { transform: scale(1.1); }

        .play-btn {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 60px; height: 60px;
            background: rgba(255,255,255,0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: all 0.3s;
        }

        .video-card:hover .play-btn { opacity: 1; }

        .play-btn svg { width: 24px; height: 24px; fill: #000; margin-left: 4px; }

        .video-info { padding: 20px; }

        .video-title {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .video-meta {
            font-size: 13px;
            opacity: 0.5;
        }

        .toast {
            position: fixed;
            bottom: 30px; left: 50%;
            transform: translateX(-50%) translateY(100px);
            padding: 16px 32px;
            border-radius: 50px;
            opacity: 0;
            transition: all 0.4s;
            z-index: 300;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>

    <header class="header glass">
        <div class="logo">STREAM</div>
        <div class="menu-btn glass" onclick="toggleDrawer()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
                <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
            </svg>
        </div>
    </header>

    <div class="drawer-overlay" onclick="toggleDrawer()"></div>
    
    <div class="drawer glass" id="drawer">
        <h2 style="margin-bottom: 30px; font-weight: 300;">Kategori</h2>
        
        <div class="folder-card glass" onclick="filterCategory('hijab')">
            <h3>Hijab</h3>
            <p style="opacity: 0.6; margin-top: 5px;"><span id="count-hijab">0</span> video</p>
        </div>
        
        <div class="folder-card glass" onclick="filterCategory('bocil')">
            <h3>Bocil</h3>
            <p style="opacity: 0.6; margin-top: 5px;"><span id="count-bocil">0</span> video</p>
        </div>
        
        <div class="folder-card glass" onclick="filterCategory('abg')">
            <h3>ABG</h3>
            <p style="opacity: 0.6; margin-top: 5px;"><span id="count-abg">0</span> video</p>
        </div>
    </div>

    <main class="main-content">
        <h1 class="section-title">Video Terbaru</h1>
        <p style="opacity: 0.6;">Klik menu kanan untuk filter kategori</p>
        
        <div class="video-grid" id="videoGrid">
            <!-- Video muncul di sini -->
        </div>
    </main>

    <div class="toast glass" id="toast"></div>

    <script>
        // ============================================
        // GANTI URL INI DENGAN URL DEPLOY ANDA
        // ============================================
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw_jtcQH55fzoBkUzMh58gUqoh3QuwvRQf8a95cqQqS93yBndlbIII7PFGY2ZwzS_KefA/exec';
        
        let videos = [];
        let clickCount = {};
        let currentFilter = 'all';

        async function loadVideos() {
            try {
                showToast('Memuat...');
                
                const response = await fetch(`${SCRIPT_URL}?action=getVideos`);
                const result = await response.json();
                
                if (result.success) {
                    videos = result.data;
                    renderVideos();
                    updateCounts();
                    showToast(`${videos.length} video dimuat`);
                }
            } catch (error) {
                showToast('Error: ' + error.message);
                console.error(error);
            }
        }

        function renderVideos() {
            const grid = document.getElementById('videoGrid');
            const filtered = currentFilter === 'all' 
                ? videos 
                : videos.filter(v => v.category === currentFilter);
            
            if (filtered.length === 0) {
                grid.innerHTML = '<p style="text-align:center; opacity:0.5; grid-column:1/-1;">Tidak ada video</p>';
                return;
            }
            
            grid.innerHTML = filtered.map(video => `
                <div class="video-card glass" onclick="handleClick('${video.id}', '${video.videoUrl}')">
                    <div class="video-thumb">
                        <img src="${video.thumbnail}" alt="${video.title}" onerror="this.src='https://via.placeholder.com/400x225'">
                        <div class="play-btn">
                            <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        </div>
                    </div>
                    <div class="video-info">
                        <div class="video-title">${video.title}</div>
                        <div class="video-meta">${video.category} • ${video.date}</div>
                    </div>
                </div>
            `).join('');
        }

        function handleClick(id, url) {
            if (!clickCount[id]) clickCount[id] = 0;
            clickCount[id]++;
            
            if (clickCount[id] === 1) {
                // Klik 1: Ke Shopee
                window.location.href = 'https://s.shopee.co.id/1gEa1RAN5w';
            } else {
                // Klik 2: Preview video
                const video = videos.find(v => v.id === id);
                openPreview(video);
            }
        }

        function openPreview(video) {
            const w = window.open('', '_blank');
            w.document.write(`
                <!DOCTYPE html>
                <html>
                <head>
                    <title>${video.title}</title>
                    <style>
                        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
                        .container { width: 100%; max-width: 900px; }
                        iframe { width: 100%; height: 500px; border: none; }
                        .close { position: fixed; top: 20px; left: 20px; color: #fff; cursor: pointer; padding: 10px 20px; background: rgba(255,255,255,0.1); border-radius: 20px; }
                    </style>
                </head>
                <body>
                    <div class="close" onclick="window.close()">✕ Tutup</div>
                    <div class="container">
                        <iframe src="${video.videoUrl}" allowfullscreen></iframe>
                    </div>
                </body>
                </html>
            `);
        }

        function filterCategory(cat) {
            currentFilter = cat;
            renderVideos();
            toggleDrawer();
        }

        function updateCounts() {
            document.getElementById('count-hijab').textContent = videos.filter(v => v.category === 'hijab').length;
            document.getElementById('count-bocil').textContent = videos.filter(v => v.category === 'bocil').length;
            document.getElementById('count-abg').textContent = videos.filter(v => v.category === 'abg').length;
        }

        function toggleDrawer() {
            document.getElementById('drawer').classList.toggle('active');
            document.querySelector('.drawer-overlay').classList.toggle('active');
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        // Mulai
        loadVideos();
    </script>

</body>
</html>
